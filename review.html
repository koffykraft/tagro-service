<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#df6427">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Review Queue — TAGRO</title>
<link rel="stylesheet" href="app.css">
<style>
.page-header{padding:14px 16px 8px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:10}
.page-title{font-size:20px;font-weight:900;color:#121212}
.page-sub{font-size:12px;color:#aaa;margin-top:2px}
.filter-row{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{background:#f5f5f5;border:none;border-radius:99px;padding:7px 14px;font-size:12px;font-weight:800;color:#555;white-space:nowrap;cursor:pointer}
.filter-btn.active{background:#df6427;color:#fff}
.count-badge{display:inline-block;background:rgba(0,0,0,.12);border-radius:99px;padding:1px 7px;font-size:10px;margin-left:4px}
.card{background:#fff;border-radius:16px;margin:0 14px 10px;border:1.5px solid #e8e8e8;overflow:hidden}
.card.flagged{border-color:#f59e0b}
.card.error{border-color:#ba3327}
.card-header{padding:12px 14px 8px;display:flex;align-items:flex-start;gap:10px}
.card-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-badge.ok{background:#e8f5e9}
.card-badge.warn{background:#fff3cd}
.card-badge.err{background:#fde8e8}
.card-meta{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:900;color:#121212;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:12px;color:#888;margin-top:2px}
.card-branch{font-size:11px;font-weight:800;color:#df6427;margin-top:3px}
.card-body{padding:0 14px 10px}
.field-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.field-label{font-size:10px;font-weight:900;color:#bbb;text-transform:uppercase;width:68px;flex-shrink:0;padding-top:2px}
.field-val{font-size:13px;color:#333;flex:1;word-break:break-word}
.field-val.missing{color:#ba3327;font-style:italic}
.issues-list{background:#fff8f0;border-radius:10px;padding:8px 12px;margin-top:8px}
.issue-item{font-size:11px;color:#9a6400;margin-bottom:3px;padding-left:14px;position:relative;line-height:1.4}
.issue-item::before{content:'⚠';position:absolute;left:0;font-size:10px}
.issue-item.hard{color:#ba3327}
.issue-item.hard::before{content:'✖'}
.card-actions{display:flex;gap:8px;padding:10px 14px 14px;border-top:1px solid #f5f5f5}
.btn{flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:900;border:none;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-approve{background:#287a3e;color:#fff}
.btn-reject{background:#f5f5f5;color:#ba3327}
.btn-edit{background:#f5f5f5;color:#555}
.stats-bar{display:flex;gap:0;border-bottom:1px solid #f0f0f0}
.stat-item{flex:1;text-align:center;padding:10px 4px}
.stat-num{font-size:20px;font-weight:900;color:#121212}
.stat-lbl{font-size:9px;text-transform:uppercase;color:#aaa;font-weight:800;letter-spacing:.5px;margin-top:1px}
.stat-item.warn .stat-num{color:#f59e0b}
.stat-item.err .stat-num{color:#ba3327}
.stat-item.ok .stat-num{color:#287a3e}
.empty{text-align:center;padding:48px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:32px;color:#aaa;font-size:14px}
.edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end}
.edit-overlay.show{display:flex}
.edit-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 20px 40px}
.edit-title{font-size:16px;font-weight:900;margin-bottom:16px;color:#121212}
.edit-field{margin-bottom:14px}
.edit-field label{display:block;font-size:11px;font-weight:900;color:#888;text-transform:uppercase;margin-bottom:4px}
.edit-field input,.edit-field select{width:100%;padding:10px 12px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:14px;box-sizing:border-box;-webkit-appearance:none}
.edit-field input:focus,.edit-field select:focus{outline:none;border-color:#df6427}
.edit-actions{display:flex;gap:10px;margin-top:16px}
.back-btn{display:flex;align-items:center;gap:6px;padding:12px 16px 4px;color:#aaa;font-size:13px;font-weight:800;cursor:pointer;text-decoration:none}
.days-badge{display:inline-block;background:#fff1e9;color:#df6427;border-radius:6px;padding:2px 6px;font-size:10px;font-weight:900;margin-left:4px}
.days-badge.old{background:#fde8e8;color:#ba3327}
</style>
</head>
<body>
<div class="wrap" style="padding:0;max-width:600px">

  <a class="back-btn" href="home.html">← Back</a>

  <div class="page-header">
    <div class="page-title">📋 Review Queue</div>
    <div class="page-sub" id="queue-sub">Loading...</div>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-lbl">Pending</div>
    </div>
    <div class="stat-item err">
      <div class="stat-num" id="stat-hard">0</div>
      <div class="stat-lbl">Hard</div>
    </div>
    <div class="stat-item warn">
      <div class="stat-num" id="stat-soft">0</div>
      <div class="stat-lbl">Soft Flags</div>
    </div>
    <div class="stat-item ok">
      <div class="stat-num" id="stat-clean">0</div>
      <div class="stat-lbl">Clean</div>
    </div>
  </div>

  <div class="filter-row" id="filter-row"></div>

  <div id="cards-container">
    <div class="loading">Loading records...</div>
  </div>

</div>

<!-- Edit overlay -->
<div class="edit-overlay" id="edit-overlay">
  <div class="edit-sheet">
    <div class="edit-title">✏️ Edit Record</div>
    <input type="hidden" id="edit-id">
    <div class="edit-field"><label>Customer Name</label><input type="text" id="edit-customer" autocomplete="off"></div>
    <div class="edit-field"><label>Phone</label><input type="tel" id="edit-phone" autocomplete="off"></div>
    <div class="edit-field"><label>Model</label><input type="text" id="edit-model" autocomplete="off"></div>
    <div class="edit-field"><label>Serial Number</label><input type="text" id="edit-serial" autocomplete="off"></div>
    <div class="edit-field"><label>Complaint</label><input type="text" id="edit-complaint" autocomplete="off" placeholder="Describe the fault..."></div>
    <div class="edit-field">
      <label>Status</label>
      <select id="edit-status">
        <option value="In Shop">In Shop</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
        <option value="Returned">Returned</option>
        <option value="Awaiting Parts">Awaiting Parts</option>
        <option value="Customer Unreachable">Customer Unreachable</option>
        <option value="Customer Declined">Customer Declined</option>
      </select>
    </div>
    <div class="edit-actions">
      <button class="btn btn-approve" onclick="saveEdit()">✓ Save & Approve</button>
      <button class="btn btn-reject" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://tagro-service-ingest.icy-fire-d2ac.workers.dev';
const TOKEN = localStorage.getItem('ownerToken') || 'tagro-owner-VE1UaG9tYXM5NjU2MzYxODQ2';

let allRecords = [];
let currentBranch = 'ALL';
const today = new Date();

function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return Math.floor((today - d) / 86400000);
}

function parseIssues(raw) {
  if (!raw) return [];
  try { const p = JSON.parse(raw); return Array.isArray(p) ? p : []; }
  catch { return []; }
}

function parsedData(r) {
  try { return JSON.parse(r.parsed_data || '{}'); }
  catch { return {}; }
}

// Hard = only structured objects with severity:'hard'
function hasHardIssue(issues) {
  return issues.some(i => typeof i === 'object' && i !== null && i.severity === 'hard');
}

function hasSoftIssue(issues) {
  return issues.length > 0 && !hasHardIssue(issues);
}

async function load() {
  try {
    const res = await fetch(`${WORKER}/staging?status=pending&limit=200`);
    allRecords = await res.json();
    renderStats();
    renderFilters();
    renderCards();
    document.getElementById('stats-bar').style.display = 'flex';
    document.getElementById('queue-sub').textContent = `${allRecords.length} records awaiting review`;
  } catch(e) {
    document.getElementById('cards-container').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>Could not load.<br>${e.message}</p></div>`;
  }
}

function renderStats() {
  let hard = 0, soft = 0, clean = 0;
  allRecords.forEach(r => {
    const issues = parseIssues(r.ai_issues);
    if (hasHardIssue(issues)) hard++;
    else if (issues.length > 0) soft++;
    else clean++;
  });
  document.getElementById('stat-total').textContent = allRecords.length;
  document.getElementById('stat-hard').textContent = hard;
  document.getElementById('stat-soft').textContent = soft;
  document.getElementById('stat-clean').textContent = clean;
}

function renderFilters() {
  const branches = ['ALL', ...new Set(allRecords.map(r => r.branch).filter(Boolean)).values()].sort();
  document.getElementById('filter-row').innerHTML = branches.map(b => {
    const count = b === 'ALL' ? allRecords.length : allRecords.filter(r => r.branch === b).length;
    return `<button class="filter-btn ${b === currentBranch ? 'active' : ''}" onclick="setFilter('${b}')">${b}<span class="count-badge">${count}</span></button>`;
  }).join('');
}

function setFilter(b) {
  currentBranch = b;
  renderFilters();
  renderCards();
}

function renderCards() {
  const records = currentBranch === 'ALL' ? allRecords : allRecords.filter(r => r.branch === currentBranch);
  if (!records.length) {
    document.getElementById('cards-container').innerHTML =
      `<div class="empty"><div class="empty-icon">✅</div><p>No pending records${currentBranch !== 'ALL' ? ' for '+currentBranch : ''}.</p></div>`;
    return;
  }

  document.getElementById('cards-container').innerHTML = records.map(r => {
    const p = parsedData(r);
    const issues = parseIssues(r.ai_issues);
    const isHard = hasHardIssue(issues);
    const isSoft = !isHard && issues.length > 0;
    const conf = r.ai_confidence || 1;
    const days = daysSince(p.job_date);

    const cardClass = isHard ? 'error' : isSoft ? 'flagged' : '';
    const badgeClass = isHard ? 'err' : isSoft ? 'warn' : 'ok';
    const badgeIcon = isHard ? '✖' : isSoft ? '⚠' : '✓';

    const daysBadge = days !== null
      ? `<span class="days-badge ${days > 14 ? 'old' : ''}">${days}d</span>`
      : '';

    // Only show structured soft issues (field-level) in summary
    const structuredIssues = issues.filter(i => typeof i === 'object' && i !== null);
    const issueHtml = structuredIssues.length ? `
      <div class="issues-list">
        ${structuredIssues.map(i =>
          `<div class="issue-item ${i.severity === 'hard' ? 'hard' : ''}">${i.msg}</div>`
        ).join('')}
      </div>` : '';

    const phone = p.customer_phone;
    const complaint = p.complaint;
    const serial = p.serial_no;

    return `
    <div class="card ${cardClass}" id="card-${r.id}">
      <div class="card-header">
        <div class="card-badge ${badgeClass}">${badgeIcon}</div>
        <div class="card-meta">
          <div class="card-title">${p.customer_name || 'Unknown Customer'}</div>
          <div class="card-sub">${p.machine_model || '—'} · ${serial ? 'S/N '+serial : 'No serial'}${daysBadge}</div>
          <div class="card-branch">${r.branch} · ${(p.job_date||'').split('T')[0].split(' ')[0] || 'No date'}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="field-row">
          <span class="field-label">Phone</span>
          <span class="field-val ${!phone ? 'missing' : ''}">${phone || 'Missing'}</span>
        </div>
        <div class="field-row">
          <span class="field-label">Complaint</span>
          <span class="field-val ${!complaint ? 'missing' : ''}">${complaint || 'Missing'}</span>
        </div>
        <div class="field-row">
          <span class="field-label">Status</span>
          <span class="field-val">${p.work_status || '—'}</span>
        </div>
        ${issueHtml}
      </div>
      <div class="card-actions">
        <button class="btn btn-approve" onclick="approveRecord(${r.id})">✓ Approve</button>
        <button class="btn btn-edit" onclick="editRecord(${r.id})">✏ Edit</button>
        <button class="btn btn-reject" onclick="rejectRecord(${r.id})">✖</button>
      </div>
    </div>`;
  }).join('');
}

async function approveRecord(id) {
  const card = document.getElementById('card-'+id);
  card.style.opacity = '0.4';
  card.style.pointerEvents = 'none';
  try {
    const res = await fetch(`${WORKER}/ingest/approve/${id}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-tagro-key': TOKEN},
      body: '{}'
    });
    const data = await res.json();
    if (data.ok || data.job_id) {
      card.remove();
      allRecords = allRecords.filter(r => r.id !== id);
      renderStats();
      renderFilters();
      document.getElementById('queue-sub').textContent = `${allRecords.length} records awaiting review`;
    } else {
      card.style.opacity = '1';
      card.style.pointerEvents = '';
      alert('Error: ' + JSON.stringify(data));
    }
  } catch(e) {
    card.style.opacity = '1';
    card.style.pointerEvents = '';
    alert('Network error: ' + e.message);
  }
}

async function rejectRecord(id) {
  if (!confirm('Remove this record from the queue?')) return;
  const card = document.getElementById('card-'+id);
  card.style.opacity = '0.4';
  try {
    await fetch(`${WORKER}/staging/reject/${id}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-tagro-key': TOKEN},
      body: '{}'
    });
    card.remove();
    allRecords = allRecords.filter(r => r.id !== id);
    renderStats();
    renderFilters();
  } catch(e) {
    card.style.opacity = '1';
  }
}

function editRecord(id) {
  const record = allRecords.find(r => r.id === id);
  if (!record) return;
  const p = parsedData(record);
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-customer').value = p.customer_name || '';
  document.getElementById('edit-phone').value = p.customer_phone || '';
  document.getElementById('edit-model').value = p.machine_model || '';
  document.getElementById('edit-serial').value = p.serial_no || '';
  document.getElementById('edit-complaint').value = p.complaint || '';
  const sel = document.getElementById('edit-status');
  sel.value = p.work_status || 'In Shop';
  document.getElementById('edit-overlay').classList.add('show');
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('show');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const edits = {
    customer_name: document.getElementById('edit-customer').value,
    customer_phone: document.getElementById('edit-phone').value,
    machine_model: document.getElementById('edit-model').value,
    serial_no: document.getElementById('edit-serial').value || null,
    complaint: document.getElementById('edit-complaint').value || null,
    work_status: document.getElementById('edit-status').value
  };
  closeEdit();
  const card = document.getElementById('card-'+id);
  card.style.opacity = '0.4';
  card.style.pointerEvents = 'none';
  try {
    const res = await fetch(`${WORKER}/ingest/approve/${id}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-tagro-key': TOKEN},
      body: JSON.stringify(edits)
    });
    const data = await res.json();
    if (data.ok || data.job_id) {
      card.remove();
      allRecords = allRecords.filter(r => r.id !== id);
      renderStats();
      renderFilters();
      document.getElementById('queue-sub').textContent = `${allRecords.length} records awaiting review`;
    } else {
      card.style.opacity = '1';
      card.style.pointerEvents = '';
      alert('Error: ' + JSON.stringify(data));
    }
  } catch(e) {
    card.style.opacity = '1';
    card.style.pointerEvents = '';
    alert('Network error: ' + e.message);
  }
}

document.getElementById('edit-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

load();
</script>
</body>
</html>
