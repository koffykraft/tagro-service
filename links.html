<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Links</title><link rel="stylesheet" href="app.css"></head><body><div class="wrap"><div class="card"><div class="head">Important Sites</div><div class="body"><div id="links" class="list"></div></div></div><div class="card"><div class="head">Branch Contacts</div><div class="body"><div id="contacts" class="list"></div></div></div></div><script src="app.js"></script><script>let s=requireLogin();initShell('links');links.innerHTML=jget('tagro_links',TAGRO.links).map(l=>`<a class="item" href="${l.url}" target="_blank"><div class="title">${l.title}</div><div class="sub">${l.url}</div></a>`).join('');contacts.innerHTML=Object.entries(TAGRO.people).map(([b,p])=>`<div class="item"><div class="title">${b} — ${TAGRO.branches[b]}</div><div class="sub">Manager: ${p.manager}<br>Staff: ${p.staff.join(', ')||'—'}</div></div>`).join('');</script></body></html>
