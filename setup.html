<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TAGRO — Setup</title><link rel="stylesheet" href="app.css"></head><body><script src="app.js"></script><header><img src="https://koffykraft.github.io/tagro-site/assets/logos/tagro-logo.png"><span class="tag">SETUP</span></header><main class="wrap"><div class="danger-note"><b>Prototype note:</b> Dropbox tokens in browser localStorage are convenient but not ideal. For production, use Netlify Functions so Dropbox/API keys stay on the server.</div><div class="section"><div class="head">Dropbox Token</div><div class="field"><label>Token</label><input type="password" id="token" placeholder="Paste token"></div><div class="field"><button class="btn dark" onclick="testToken()">Test & Save</button></div></div><div class="section"><div class="head">Next</div><div class="field"><a class="btn primary" href="config.html" style="display:block;text-align:center;text-decoration:none">Open Branch Config</a></div></div></main><div id="toast" class="toast"></div><script>async function testToken(){const token=$('token').value.trim();if(!token)return toast('Paste token first');try{const res=await fetch('https://api.dropboxapi.com/2/users/get_current_account',{method:'POST',headers:{Authorization:`Bearer ${token}`}});if(res.ok){localStorage.setItem('dbx_token',token);toast('Dropbox token saved')}else toast('Invalid token')}catch{toast('Connection failed')}}</script></body></html>
