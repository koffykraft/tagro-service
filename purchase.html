<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Purchase Requirements</title><link rel="stylesheet" href="app.css"></head><body><div class="wrap"><div class="card"><div class="head">Purchase / Transfer Requirements</div><div class="body"><p class="small">Parts marked not available from service jobs appear here. Day-end inventory run can compare this with branch stock and suggest transfer or purchase.</p></div></div><div id="list" class="list"></div></div><script src="app.js"></script><script>let s=requireLogin();initShell('po');function render(){let a=po().filter(x=>s.role==='Owner'||s.demo||x.branch===s.branch);list.innerHTML=a.map((x,i)=>{let p=parts().find(p=>p.no===x.no);let src=p?Object.entries(p.stock||{}).filter(([b,q])=>b!==x.branch&&q>0).map(([b,q])=>`${b} has ${q}`).join(', '):'';let suggest=src?`Transfer: ${src}`:'Purchase from supplier';return `<div class="item"><div class="title">${x.name} <span class="badge amber">Qty ${x.qty}</span></div><div class="sub">${x.branch} · ${x.workOrder} · ${x.customer} · ${x.machine}<br><b>Suggested:</b> ${suggest}</div><div class="actions" style="margin-top:10px"><button class="btn green" onclick="closePO('${x.id}')">Mark Done</button></div></div>`}).join('')||'<div class="card"><div class="body small">No purchase requirements.</div></div>'}function closePO(id){let a=po().filter(x=>x.id!==id);savePo(a);render()}render();</script></body></html>
