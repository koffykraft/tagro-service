<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Interactive Catalog — TAGRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: { tagro: { DEFAULT: '#df6427', light: '#fff1e9', dark: '#c44d12', border: '#fed8c2' } } } }
  }
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
.custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
.custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
.zoom-transition { transition: transform 0.15s ease-out; }
</style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col pb-16">

<div class="bg-white border-b border-slate-200 sticky top-0 z-50 px-4 py-3 shadow-sm">
  <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <button onclick="goBackToActiveJob()" id="editor-back-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-extrabold px-3 py-2 rounded-xl transition-all duration-150 flex items-center gap-1">← Exit</button>
      <span class="text-tagro text-2xl font-black tracking-wider flex items-center gap-1.5"><span class="text-xl">🛠️</span> TAGRO</span>
      <span class="h-5 w-[1.5px] bg-slate-200"></span>
      <h1 class="text-sm font-extrabold text-slate-500 uppercase tracking-widest">Interactive Bench Catalog</h1>
    </div>
    <div class="flex items-center gap-2">
      <span id="active-wo-header" class="text-xs font-bold text-slate-400 bg-slate-50 py-1 px-3.5 rounded-full border">Context: Independent Browser</span>
      <span class="inline-flex items-center gap-1.5 bg-emerald-50 text-emerald-700 border border-emerald-200 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider">
        <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Connected to R2 Storage
      </span>
    </div>
  </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 w-full">
  <div class="lg:col-span-7 flex flex-col gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 space-y-3">
      <div class="flex flex-wrap gap-4 items-center justify-between">
        <div>
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">Equipment Model</label>
          <select id="model-select" onchange="changeModel(this.value)" class="bg-slate-50 hover:bg-slate-100/80 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold focus:outline-none focus:border-tagro cursor-pointer">
            <option value="MS250">STIHL MS 250 (Chainsaw)</option>
            <option value="MS461">STIHL MS 461 (Chainsaw)</option>
            <option value="FS120">STIHL FS 120 (Brushcutter)</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider block mb-1">Assembly Section</label>
          <select id="section-select" onchange="changeSection(this.value)" class="bg-slate-50 hover:bg-slate-100/80 border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold focus:outline-none focus:border-tagro cursor-pointer">
            <option value="Engine">Engine (Page 2)</option>
            <option value="Housing">Motor housing (Page 4)</option>
            <option value="Pump">Oil pump (Page 6)</option>
            <option value="Clutch">Clutch (Page 8)</option>
          </select>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col relative min-h-[420px] lg:h-[580px]">
      <div class="bg-slate-50 border-b border-slate-100 px-4 py-2.5 flex items-center justify-between">
        <span class="text-xs font-extrabold text-slate-500 uppercase flex items-center gap-1.5"><span>🎨</span> R2 Schematic Diagram — <span id="schematic-page-label">Page 2</span></span>
        <div class="flex items-center gap-1.5">
          <button onclick="zoomSchematic(0.1)" class="bg-white hover:bg-slate-100 border border-slate-200 p-1.5 rounded-lg text-xs font-black">+</button>
          <button onclick="zoomSchematic(-0.1)" class="bg-white hover:bg-slate-100 border border-slate-200 p-1.5 rounded-lg text-xs font-black">-</button>
          <button onclick="resetZoom()" class="bg-white hover:bg-slate-100 border border-slate-200 px-2 py-1.5 rounded-lg text-[10px] font-bold">Reset</button>
        </div>
      </div>
      <div class="flex-1 overflow-hidden relative bg-slate-100 cursor-grab active:cursor-grabbing flex items-center justify-center select-none" id="schematic-drag-container">
        <div id="schematic-viewport" class="zoom-transition origin-center relative">
          <img id="schematic-img" src="https://placehold.co/600x600/f1f5f9/df6427?text=STIHL+MS250+Engine+Schematic" alt="Schematic Diagram" class="max-h-[500px] w-auto pointer-events-none rounded-lg shadow-sm border border-slate-200">
          <div id="hotspots-container" class="absolute inset-0 pointer-events-none"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="lg:col-span-5 flex flex-col gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex flex-col min-h-[500px] lg:h-[684px] overflow-hidden">
      <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
        <div>
          <h2 class="text-sm font-extrabold text-slate-800 uppercase tracking-wide">Structural Parts Index</h2>
          <p class="text-[11px] text-slate-400 mt-0.5" id="source-file-label">Source: Stihl MS_Parts 2024.xlsx</p>
        </div>
        <span id="section-part-count" class="text-[10px] font-black text-tagro bg-tagro-light border border-tagro-border py-0.5 px-2.5 rounded-full">0 parts loaded</span>
      </div>
      <div class="mb-3 relative">
        <input id="parts-search-field" type="search" oninput="filterSectionParts(this.value)" class="w-full bg-slate-50 border border-slate-200 focus:border-tagro outline-none rounded-xl py-2 pl-3 pr-3 text-xs font-semibold" placeholder="Filter parts in this section...">
      </div>
      <div class="flex-1 overflow-y-auto custom-scroll pr-1 divide-y divide-slate-100" id="parts-list-tbody"></div>
      <div class="border-t border-slate-100 pt-4 mt-4 space-y-3 shrink-0">
        <div class="bg-slate-50 border border-slate-100 rounded-xl p-3 flex items-center justify-between">
          <div><span class="text-[9px] font-black text-slate-400 uppercase tracking-wider block">Estimated Price Specs</span><span class="text-xs font-bold text-slate-700">Combined Bench Estimate</span></div>
          <div class="text-right"><span class="text-[10px] text-slate-400 block line-through" id="combined-mrp-label">MRP: ₹0</span><span class="text-xs font-black text-tagro" id="estimation-draft-total">₹0</span></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="addSelectedToEstimate()" class="bg-tagro hover:bg-tagro-dark text-white text-xs font-black py-3 rounded-xl shadow-sm shadow-tagro/25">Add to Estimate</button>
          <button onclick="raisePurchaseOrder()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200 text-xs font-black py-3 rounded-xl">Raise PO Line</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="parts-search.js"></script>

</body>
</html>
