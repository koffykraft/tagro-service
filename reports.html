<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#df6427">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TAGRO">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Reports — TAGRO</title>
<link rel="stylesheet" href="app.css">
<style>
.report-stat { background:#fff; border-radius:14px; padding:14px; text-align:center; border:1px solid #e8e8e8; }
.report-stat b { display:block; font-size:28px; font-weight:900; }
.report-stat span { font-size:11px; color:#777; text-transform:uppercase; font-weight:900; letter-spacing:.5px; margin-top:4px; display:block; }
.variance-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f0; }
.variance-row:last-child { border-bottom:0; }
.var-up   { color:#2f7d3d; font-weight:900; }
.var-down { color:#b9473d; font-weight:900; }
</style>
</head>
<body>
<div class="wrap" style="max-width:640px">

  <!-- Stats -->
  <div class="card">
    <div class="head" id="report-head">Today's Summary</div>
    <div class="body">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px" id="stat-grid"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn primary" onclick="setRange('today')">Today</button>
        <button class="btn" onclick="setRange('week')">This Week</button>
        <button class="btn" onclick="setRange('month')">This Month</button>
      </div>
    </div>
  </div>

  <!-- Jobs list -->
  <div class="card">
    <div class="head">Jobs</div>
    <div class="body" id="jobs-list"></div>
  </div>

  <!-- Variance report -->
  <div class="card" id="variance-card" style="display:none">
    <div class="head">Labour Variance</div>
    <div class="body" id="variance-list">
      <p class="small">Variance shows billed vs standard rate. Blue = above. Red = below.</p>
    </div>
  </div>

  <!-- Day-end copy -->
  <div class="card">
    <div class="head">Day-End Report</div>
    <div class="body">
      <textarea id="report-txt" style="width:100%;min-height:160px;border:1px solid #e8e8e8;border-radius:10px;padding:12px;font:inherit;font-size:14px;resize:vertical"></textarea>
      <button class="btn primary block" style="margin-top:10px" onclick="copyReport()">Copy Report</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
const s = requireLogin();
initShell('links');

let range = 'today';

function setRange(r) {
  range = r;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('primary'));
  event.target.classList.add('primary');
  render();
}

function inRange(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  if (range === 'today') {
    return d.toDateString() === now.toDateString();
  } else if (range === 'week') {
    const weekAgo = new Date(now - 7 * 86400000);
    return d >= weekAgo;
  } else {
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }
}

function render() {
  const myJobs = jobs().filter(j =>
    (s.role === 'Owner' || j.branch === s.branch) && inRange(j.date)
  );

  const open      = myJobs.filter(j => !['Delivered','Completed'].includes(j.status));
  const ready     = myJobs.filter(j => j.status === 'Ready');
  const delivered = myJobs.filter(j => ['Delivered','Completed'].includes(j.status));
  const revenue   = myJobs.reduce((a, j) => a + (j.estimate?.lines?.reduce((s, ln) => s + ln.amount * ln.qty, 0) || 0), 0);

  const labels = range === 'today' ? 'Today' : range === 'week' ? 'This Week' : 'This Month';
  document.getElementById('report-head').textContent = labels + ' — ' + (s.branchName || s.branch || 'All Branches');

  document.getElementById('stat-grid').innerHTML = [
    { label: 'Received', val: myJobs.length, cls: '' },
    { label: 'Open', val: open.length, cls: '' },
    { label: 'Ready', val: ready.length, cls: '' },
    { label: 'Delivered', val: delivered.length, cls: '' },
  ].map(st => `
    <div class="report-stat">
      <b>${st.val}</b>
      <span>${st.label}</span>
    </div>`
  ).join('');

  // Jobs list
  document.getElementById('jobs-list').innerHTML = myJobs.length
    ? myJobs.slice().reverse().map(j => `
        <div class="variance-row">
          <div>
            <div style="font-weight:800;font-size:14px">${j.customer?.name} — ${j.machine?.model}</div>
            <div style="font-size:12px;color:#777">${j.workOrder} · ${j.status}</div>
          </div>
          <a class="btn" href="work.html?id=${j.id}" style="font-size:12px;padding:6px 12px">Open</a>
        </div>`
      ).join('')
    : '<div class="small">No jobs in this period.</div>';

  // Variance
  const varLines = [];
  myJobs.forEach(j => {
    (j.estimate?.lines || []).forEach(ln => {
      if (ln.standardRate && ln.amount !== ln.standardRate) {
        varLines.push({ job: j, line: ln });
      }
    });
  });

  const varCard = document.getElementById('variance-card');
  if (varLines.length) {
    varCard.style.display = 'block';
    document.getElementById('variance-list').innerHTML = `
      <p class="small" style="margin-bottom:10px">Variance shows billed vs standard rate.</p>` +
      varLines.map(({ job, line }) => {
        const diff = line.amount - line.standardRate;
        const cls  = diff > 0 ? 'var-up' : 'var-down';
        const sign = diff > 0 ? '+' : '';
        return `
          <div class="variance-row">
            <div>
              <div style="font-size:13px;font-weight:800">${line.name}</div>
              <div style="font-size:12px;color:#777">${job.customer?.name} · ${job.workOrder}</div>
              ${line.editReason ? `<div style="font-size:11px;color:#aaa">${line.editReason}</div>` : ''}
            </div>
            <div class="${cls}">${sign}₹${Math.abs(diff)}</div>
          </div>`;
      }).join('');
  } else {
    varCard.style.display = 'none';
  }

  // Day-end report text
  document.getElementById('report-txt').value =
    `TAGRO SERVICE DAY-END REPORT\n` +
    `Date: ${new Date().toLocaleString('en-IN')}\n` +
    `Branch: ${s.branchName || s.branch || 'All'}\n` +
    `Reported by: ${s.name}\n\n` +
    `Jobs received: ${myJobs.length}\n` +
    `Open: ${open.length}\n` +
    `Ready for collection: ${ready.length}\n` +
    `Delivered: ${delivered.length}\n` +
    `Estimate value: ₹${revenue.toLocaleString('en-IN')}\n` +
    `Purchase requests: ${po().filter(p => s.role === 'Owner' || p.branch === s.branch).length}\n\n` +
    `OPEN JOBS:\n` +
    open.map(j => `${j.workOrder} | ${j.customer?.name} | ${j.machine?.model} | ${j.status}`).join('\n');
}

function copyReport() {
  navigator.clipboard.writeText(document.getElementById('report-txt').value)
    .then(() => toast('Copied'))
    .catch(() => toast('Select and copy manually'));
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
