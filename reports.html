<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="stylesheet" href="app.css"></head><body><div class="wrap"><div class="statgrid"><div class="stat"><b id="received">0</b><span>Received</span></div><div class="stat"><b id="ready">0</b><span>Ready</span></div><div class="stat"><b id="delivered">0</b><span>Delivered</span></div><div class="stat"><b id="amount">₹0</b><span>Total</span></div></div><div class="card"><div class="head">Branch Summary</div><div class="body"><div id="branches" class="list"></div></div></div><div class="card"><div class="head">Copy Day-End Report</div><div class="body"><textarea id="txt" style="width:100%;min-height:220px;border:1px solid var(--line);border-radius:12px;padding:12px"></textarea><button class="btn block" onclick="navigator.clipboard.writeText(txt.value);toast('Copied')">Copy Report</button></div></div></div><script src="app.js"></script><script>let s=requireLogin();initShell('reports');let a=jobs().filter(j=>s.role==='Owner'||s.demo||j.branch===s.branch);received.textContent=a.length;ready.textContent=a.filter(j=>j.status==='Ready').length;delivered.textContent=a.filter(j=>j.status==='Delivered').length;amount.textContent='₹'+a.reduce((x,j)=>x+(Number(j.total)||0),0);let codes=s.role==='Owner'?Object.keys(TAGRO.branches):[s.branch];branches.innerHTML=codes.map(b=>{let x=a.filter(j=>j.branch===b);let poN=po().filter(p=>p.branch===b).length;return `<div class="item"><div class="title">${b} — ${TAGRO.branches[b]}</div><div class="sub">Jobs ${x.length} · Ready ${x.filter(j=>j.status==='Ready').length} · PO ${poN} · Value ₹${x.reduce((v,j)=>v+(Number(j.total)||0),0)}</div></div>`}).join('');txt.value=`TAGRO SERVICE DAY-END REPORT\nDate: ${new Date().toLocaleString('en-IN')}\nUser: ${s.name}\n\nJobs received/open: ${a.length}\nReady: ${ready.textContent}\nDelivered: ${delivered.textContent}\nTotal estimate/invoice: ${amount.textContent}\nPurchase requirements: ${po().length}\n\nOpen Jobs:\n`+a.map(j=>`${j.branch} | ${j.workOrder} | ${j.customer.name} | ${j.machine.model} | ${j.status}`).join('\n');</script></body></html>
