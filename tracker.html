<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TAGRO — Tracker</title><link rel="stylesheet" href="app.css"></head><body><script src="app.js"></script><script>requireAuth('tracker.html');header('tracker')</script><div class="search"><input id="q" type="search" placeholder="Search name, phone, serial, model, work order" oninput="render()"></div><main class="wrap"><div class="summary"><div><b id="nAll">0</b><span>Total</span></div><div><b id="nOpen">0</b><span>Open</span></div><div><b id="nPend">0</b><span>Pending</span></div><div><b id="nDone">0</b><span>Done</span></div></div><div class="optrow" style="margin-bottom:12px"><button class="opt on" onclick="f='all';pick(this);render()">All</button><button class="opt" onclick="f='Waiting';pick(this);render()">Waiting</button><button class="opt" onclick="f='In-Progress';pick(this);render()">In Progress</button><button class="opt" onclick="f='Pending';pick(this);render()">Pending</button><button class="opt" onclick="f='Completed';pick(this);render()">Completed</button></div><div id="list" class="list"></div></main><a class="btn primary" style="position:fixed;right:20px;bottom:calc(20px + env(safe-area-inset-bottom));border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none" href="jobcard.html">+</a><div id="toast" class="toast"></div><script>let f='all';function pick(el){document.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));el.classList.add('on')}function daysAgo(iso){return Math.floor((Date.now()-new Date(iso).getTime())/86400000)}function setStatus(i,s){const all=jobs();all[i].status=s;all[i].statusUpdatedAt=new Date().toISOString();saveJobs(all);toast('Status updated');render()}function render(){let j=jobs();const visible=visibleJobs();$('nAll').textContent=visible.length;$('nOpen').textContent=visible.filter(x=>['Waiting','In-Progress'].includes(x.status)).length;$('nPend').textContent=visible.filter(x=>x.status==='Pending').length;$('nDone').textContent=visible.filter(x=>x.status==='Completed').length;const q=$('q').value.toLowerCase();let arr=j.map((x,i)=>({...x,_i:i})).filter(x=>(session()?.role==='owner'||(x.branch||cfg().branch)===cfg().branch)).filter(x=>(f==='all'||x.status===f)&&(!q||[x.workOrder,x.customer?.name,x.customer?.phone,x.machine?.serialNo,x.machine?.model,x.job?.complaint].join(' ').toLowerCase().includes(q))).reverse();$('list').innerHTML=arr.length?arr.map(x=>`<div class="card"><div class="head"><span class="mono">${x.workOrder||'—'}</span>${statusPill(x.status)}</div><div class="field"><b>${x.customer?.name||'—'}</b><div class="mini muted">${x.customer?.phone||''} · ${x.machine?.model||''} ${x.machine?.serialNo||''}</div><div style="margin-top:8px">${x.job?.complaint||'No complaint recorded'}</div><div class="mini muted" style="margin-top:8px">${daysAgo(x.date)} day(s) old · ${x.branch||''}</div></div><div class="field"><div class="optrow"><button class="btn" onclick="setStatus(${x._i},'Waiting')">Waiting</button><button class="btn" onclick="setStatus(${x._i},'In-Progress')">In Progress</button><button class="btn" onclick="setStatus(${x._i},'Pending')">Pending</button><button class="btn green" onclick="setStatus(${x._i},'Completed')">Completed</button>${x.customer?.phone?`<a class="btn" href="tel:${x.customer.phone}">Call</a>`:''}</div></div></div>`).join(''):'<div class="empty">No matching jobs</div>'}render()</script></body></html>
