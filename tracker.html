<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Jobs</title><link rel="stylesheet" href="app.css"></head><body><div class="wrap"><div class="card"><div class="head">Search Jobs</div><div class="body"><div class="field"><input id="q" placeholder="Name, phone, model, serial, work order" oninput="render()"></div><div class="pillrow"><button class="pill on" onclick="filter='all';sel(this);render()">All</button><button class="pill" onclick="filter='Received';sel(this);render()">Received</button><button class="pill" onclick="filter='Repairing';sel(this);render()">Repairing</button><button class="pill" onclick="filter='Waiting Parts';sel(this);render()">Waiting Parts</button><button class="pill" onclick="filter='Ready';sel(this);render()">Ready</button><button class="pill" onclick="filter='Delivered';sel(this);render()">Delivered</button></div></div></div><div id="list" class="list"></div></div><script src="app.js"></script><script>let s=requireLogin();initShell('jobs');let filter='all';function sel(b){document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));b.classList.add('on')}function render(){let query=q.value.toLowerCase();let arr=jobs().filter(j=>(s.role==='Owner'||s.demo||j.branch===s.branch));if(filter!=='all')arr=arr.filter(j=>j.status===filter);if(query)arr=arr.filter(j=>JSON.stringify(j).toLowerCase().includes(query));list.innerHTML=arr.slice().reverse().map(j=>`<div class="item"><div class="title">${j.customer?.name} — ${j.machine?.model} <span class="badge orange">${j.status}</span></div><div class="sub">${j.workOrder} · ${j.customer?.phone||''} · ${j.machine?.serialNo||''}<br>${(j.complaints||[]).map(c=>c.text).join(' / ')}</div><div class="actions" style="margin-top:10px"><a class="btn" href="work.html?id=${j.id}">Open</a><a class="btn" href="tel:${j.customer?.phone||''}">Call</a></div></div>`).join('')||'<div class="card"><div class="body small">No jobs found.</div></div>'}render();</script></body></html>
