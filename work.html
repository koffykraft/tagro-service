<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Work</title><link rel="stylesheet" href="app.css"></head><body><div class="wrap"><div id="summary"></div><div class="card"><div class="head">Status</div><div class="body"><div class="pillrow" id="statusBtns"></div></div></div><div class="card"><div class="head">Parts Used / Required</div><div class="body"><div class="field"><label>Search Part</label><input id="partq" placeholder="Part name / part no" oninput="suggestParts()"></div><div id="partsug" class="suggest hide"></div><div class="list" id="partlist"></div></div></div><div class="card"><div class="head">Labour / Billing</div><div class="body"><div class="pillrow" id="chargeBtns"></div><div class="grid" style="margin-top:12px"><div class="field"><label>Invoice No.</label><input id="invoice"></div><div class="field"><label>Service Charges</label><input id="labour" type="number"></div></div><div class="field"><label>Work Done</label><textarea id="workdone"></textarea></div></div></div></div><div class="fixedbar"><a class="btn" href="tracker.html">Back</a><button class="btn primary" onclick="saveWork()">Save Work</button></div><script src="app.js"></script><script>let s=requireLogin();initShell('jobs');let id=new URLSearchParams(location.search).get('id'),arr=jobs(),idx=arr.findIndex(j=>j.id===id),job=arr[idx];if(!job){document.body.innerHTML='Job not found'}let statuses=['Received','Repairing','Waiting Parts','Ready','Delivered'];function render(){summary.innerHTML=`<div class="card"><div class="head">${job.workOrder}</div><div class="body"><div class="title" style="font-weight:900;font-size:20px">${job.customer.name} — ${job.machine.model}</div><div class="small">${job.customer.phone} · ${job.machine.serialNo||'No serial'} · Accepted by ${job.acceptedBy}</div><div class="small" style="margin-top:8px"><b>Complaint:</b> ${(job.complaints||[]).map(c=>c.text).join(' / ')}</div></div></div>`;statusBtns.innerHTML=statuses.map(x=>`<button class="pill ${job.status===x?'on':''}" onclick="job.status='${x}';render()">${x}</button>`).join('');chargeBtns.innerHTML=TAGRO.charges.map(c=>`<button class="pill" onclick="labour.value=${c.amount}">${c.name} ₹${c.amount}</button>`).join('');invoice.value=job.invoiceNo||'';labour.value=job.labour||0;workdone.value=job.workDone||'';renderParts()}function suggestParts(){let res=findParts(partq.value);partsug.classList.toggle('hide',!res.length);partsug.innerHTML=res.map(p=>`<button onclick="addPart('${p.no}')"><b>${p.name}</b> ₹${p.price}<br><span class="small">${p.no} · Total stock ${totalStock(p)} · Here ${p.stock?.[s.branch]||0}</span></button>`).join('')}function addPart(no){let p=parts().find(x=>x.no===no);let here=p.stock?.[s.branch]||0;job.parts=job.parts||[];job.parts.push({no:p.no,name:p.name,price:p.price,qty:1,available:here>0,required:here<=0});partq.value='';partsug.classList.add('hide');renderParts()}function renderParts(){partlist.innerHTML=(job.parts||[]).map((p,i)=>`<div class="item"><div class="title">${p.name} <span class="badge ${p.available?'green':'red'}">${p.available?'Available':'Not Available'}</span></div><div class="sub">${p.no} · ₹${p.price} · Qty <input style="width:55px;padding:5px" type="number" value="${p.qty}" onchange="job.parts[${i}].qty=Number(this.value)||1"> · ${sourceText(p)}</div><div class="actions" style="margin-top:8px"><button class="btn red" onclick="removePart(${i})">Remove</button>${p.required?`<button class="btn" onclick="addPO(${i})">Add to PO</button>`:''}</div></div>`).join('')||'<div class="small">No parts added yet.</div>'}function sourceText(p){let part=parts().find(x=>x.no===p.no);let src=Object.entries(part.stock||{}).filter(([b,q])=>b!==s.branch&&q>0).map(([b,q])=>`${b}:${q}`).join(' ');return src?'Other stock '+src:'No other stock'}function removePart(i){job.parts.splice(i,1);renderParts()}function addPO(i){let p=job.parts[i];let a=po();a.push({id:'po'+Date.now()+i,branch:job.branch,workOrder:job.workOrder,customer:job.customer.name,machine:job.machine.model,no:p.no,name:p.name,qty:p.qty,reason:'Machine waiting',createdBy:s.name,at:new Date().toISOString(),status:'Open'});savePo(a);toast('Added to purchase requirements')}function saveWork(){job.invoiceNo=invoice.value;job.labour=Number(labour.value)||0;job.workDone=workdone.value;job.total=(job.parts||[]).reduce((a,p)=>a+(p.price*(p.qty||1)),0)+job.labour;job.updatedAt=new Date().toISOString();arr[idx]=job;saveJobs(arr);toast('Saved');setTimeout(()=>location.href='tracker.html',600)}render();</script></body></html>
