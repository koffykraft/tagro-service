<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Home — TAGRO Service</title><link rel="stylesheet" href="app.css"></head><body><div class="wrap"><div class="statgrid"><div class="stat"><b id="q">0</b><span>Queue</span></div><div class="stat"><b id="r">0</b><span>Ready</span></div><div class="stat"><b id="p">0</b><span>Parts</span></div><div class="stat"><b id="d">0</b><span>Done</span></div></div><div class="card"><div class="head">Fast Actions</div><div class="body actions"><a class="btn primary" href="quick.html">+ Quick Receive</a><a class="btn" href="tracker.html">Today's Jobs</a><a class="btn" href="purchase.html">PO View</a><a class="btn" href="links.html">Useful Links</a></div></div><div class="card"><div class="head">Today’s Queue</div><div class="body"><div id="queue" class="list"></div></div></div><div class="card"><div class="head">Record a Comment / Experience</div><div class="body"><div class="field"><textarea id="comment" placeholder="Example: MS250 clutch puller needed. Customer reported ethanol fuel issue. Area manager visiting Friday."></textarea></div><button class="btn block" onclick="addComment()">Save Comment</button></div></div><div class="card"><div class="head">Recent Comments</div><div class="body"><div id="comments" class="list"></div></div></div></div><script src="app.js"></script><script>let s=requireLogin();initShell('home');function render(){let a=jobs().filter(j=>s.role==='Owner'||j.branch===s.branch||s.demo);q.textContent=a.filter(j=>!['Delivered','Completed'].includes(j.status)).length;r.textContent=a.filter(j=>j.status==='Ready').length;p.textContent=po().filter(x=>s.role==='Owner'||x.branch===s.branch||s.demo).length;d.textContent=a.filter(j=>['Delivered','Completed'].includes(j.status)).length;queue.innerHTML=a.slice().reverse().slice(0,8).map(j=>`<div class="item"><div class="title">${j.customer?.name||'—'} — ${j.machine?.model||'—'} <span class="badge orange">${j.status}</span></div><div class="sub">${j.workOrder} · ${j.complaints?.map(c=>c.text).join(', ')||j.complaint||''}</div></div>`).join('')||'<div class="small">No jobs yet. Use Quick Receive.</div>';comments.innerHTML=commentsList().slice(0,8)}function commentsList(){return comments().map(c=>`<div class="item"><div class="title">${c.by} <span class="badge">${c.branch}</span></div><div class="sub">${c.text}</div></div>`).join('')||'<div class="small">No comments yet.</div>'}function addComment(){if(!comment.value.trim())return toast('Write comment first');saveComment(comment.value.trim());comment.value='';toast('Comment saved');render()}render();</script></body></html>
