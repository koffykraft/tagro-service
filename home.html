<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#df6427">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TAGRO">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Workshop — TAGRO Service</title>
<link rel="stylesheet" href="app.css">
<style>
.live-header { padding:14px 16px 8px; }
.live-date { font-size:12px; color:#aaa; font-weight:700; }
.live-title { font-size:22px; font-weight:900; color:#121212; margin-top:2px; }
.live-branch { font-size:13px; color:#df6427; font-weight:800; }

/* Action buttons — the main interface */
.action-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px; }
.action-btn { background:#fff; border:1.5px solid #e8e8e8; border-radius:16px; padding:18px 12px; text-align:center; text-decoration:none; color:#333; display:block; cursor:pointer; }
.action-btn:active { background:#f9f9f9; transform:scale(.98); }
.action-btn .icon { font-size:28px; margin-bottom:8px; display:block; }
.action-btn .lbl { font-size:13px; font-weight:900; }

.stat-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 14px 14px; }
.stat-box { background:#f5f5f5; border-radius:12px; padding:12px; text-align:center; }
.stat-box .num { font-size:24px; font-weight:900; color:#df6427; line-height:1; }
.stat-box .lbl { font-size:11px; color:#777; font-weight:800; text-transform:uppercase; margin-top:4px; }

.feed-header { font-size:13px; font-weight:900; color:#aaa; text-transform:uppercase; letter-spacing:1px; margin:20px 14px 10px; }
.feed { padding:0 14px; }
.feed-item { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid #f0f0f0; }
.feed-item:last-child { border-bottom:none; }
.feed-icon { width:32px; height:32px; border-radius:50%; background:#fff4ef; color:#df6427; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.feed-content { flex:1; }
.feed-title { font-size:14px; font-weight:800; color:#111; }
.feed-meta { font-size:12px; color:#777; margin-top:3px; }
.feed-time { font-size:11px; font-weight:700; color:#aaa; }
</style>
</head>
<body>

<div class="wrap">
  <div class="live-header">
    <div class="live-date" id="live-date">...</div>
    <div class="live-title">Workshop</div>
    <div class="live-branch" id="live-branch">...</div>
  </div>

  <div class="stat-strip">
    <div class="stat-box" onclick="location.href='tracker.html'" style="cursor:pointer"><div class="num" id="stat-open">-</div><div class="lbl">Open</div></div>
    <div class="stat-box" onclick="location.href='tracker.html?status=Ready'" style="cursor:pointer"><div class="num" id="stat-ready">-</div><div class="lbl">Ready</div></div>
    <div class="stat-box" onclick="location.href='tracker.html?status=Waiting Parts'" style="cursor:pointer"><div class="num" id="stat-wait">-</div><div class="lbl">Waiting</div></div>
  </div>

  <div class="action-grid">
    <a class="action-btn" href="receive.html">
      <span class="icon">➕</span>
      <span class="lbl">New Job</span>
    </a>
    <a class="action-btn" href="tracker.html">
      <span class="icon">📋</span>
      <span class="lbl">Review Queue</span>
    </a>
    <a class="action-btn" href="catalog.html">
      <span class="icon">📚</span>
      <span class="lbl">Parts Catalog</span>
    </a>
    <a class="action-btn" href="tech.html">
      <span class="icon">🤖</span>
      <span class="lbl">Tech Assist</span>
    </a>
  </div>

  <div class="feed-header">Live Activity Feed</div>
  <div class="feed" id="live-feed">
    <div class="small" style="text-align:center;padding:20px;color:#aaa">Loading activity...</div>
  </div>
</div>

<script src="app.js"></script>
<script>
const s = requireLogin();
initShell('home');

document.getElementById('live-branch').textContent = s.role === 'Owner' ? 'All Branches Overview' : (TAGRO.branches[s.branch] || s.branch);
document.getElementById('live-date').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', month:'long', day:'numeric' });

// ── Helpers ───────────────────────────────────────────────
function getMyBranchJobs() {
  const all = jobs();
  if (s.role === 'Owner') return all;
  return all.filter(j => j.branch === s.branch);
}

function ageDays(job) {
  return Math.floor((Date.now() - new Date(job.date).getTime()) / 86400000);
}

function getRecentEvents(hours) {
  const cutoff = Date.now() - hours * 3600 * 1000;
  const allEvents = jget('tagro_events_' + s.branch, []);
  return allEvents.filter(e => new Date(e.at).getTime() > cutoff).reverse();
}

function eventIcon(type) {
  const icons = {
    received: '📥', inspection: '🔍', estimate: '📝',
    approved: '✅', repair_start: '🔧', paused: '⏸',
    resumed: '▶️', testing: '🧪', ready: '🔔', delivered: '📤',
    sms: '💬', default: '📌'
  };
  return icons[type] || icons.default;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

// ── Rendering ─────────────────────────────────────────────
function renderDashboard() {
  const myJobs = getMyBranchJobs();
  
  let open = 0, ready = 0, waiting = 0;
  
  myJobs.forEach(j => {
    const status = (j.status || '').toLowerCase();
    if (status === 'delivered' || status === 'customer declined') return;
    
    if (status === 'ready') ready++;
    else if (status.includes('wait') || status.includes('hold')) waiting++;
    else open++;
  });

  document.getElementById('stat-open').textContent = open;
  document.getElementById('stat-ready').textContent = ready;
  document.getElementById('stat-wait').textContent = waiting;

  // Extract recent timeline events from jobs
  let events = [];
  myJobs.forEach(j => {
    if (j.timeline && j.timeline.length) {
      j.timeline.forEach(t => {
        if (t.at) {
          events.push({
            jobId: j.id,
            workOrder: j.workOrder || j.id,
            model: j.machine?.model || j.model || 'Machine',
            text: t.text,
            by: t.by,
            at: t.at
          });
        }
      });
    }
  });

  // Sort newest first
  events.sort((a, b) => new Date(b.at).getTime() - new Date(a.at).getTime());
  
  const feedEl = document.getElementById('live-feed');
  
  if (events.length === 0) {
    feedEl.innerHTML = '<div class="small" style="text-align:center;padding:20px;color:#aaa">No recent activity.</div>';
    return;
  }

  feedEl.innerHTML = events.slice(0, 15).map(e => {
    // Guess icon based on text
    const txt = (e.text || '').toLowerCase();
    let type = 'default';
    if (txt.includes('receive')) type = 'received';
    else if (txt.includes('estimat')) type = 'estimate';
    else if (txt.includes('ready')) type = 'ready';
    else if (txt.includes('sms')) type = 'sms';
    else if (txt.includes('status')) type = 'repair_start';

    return `
      <div class="feed-item" onclick="location.href='work.html?id=${encodeURIComponent(e.jobId)}'" style="cursor:pointer">
        <div class="feed-icon">${eventIcon(type)}</div>
        <div class="feed-content">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div class="feed-title">${esc(e.workOrder)} <span style="font-weight:400;color:#777">— ${esc(e.model)}</span></div>
            <div class="feed-time">${timeAgo(e.at)}</div>
          </div>
          <div class="feed-meta">${esc(e.text)} <span style="color:#aaa">by ${esc(e.by)}</span></div>
        </div>
      </div>
    `;
  }).join('');
}

window.onload = () => {
  renderDashboard();
  // Auto-refresh feed if dropbox syncs in background
  setInterval(renderDashboard, 15000); 
};
</script>
</body>
</html>
