<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAGRO — Branch Config</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #111111;
    --white: #ffffff;
    --orange: #E85C0D;
    --gray-1: #f5f5f5;
    --gray-2: #e0e0e0;
    --gray-3: #999999;
    --green: #2d7a3a;
    --red: #c0392b;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--gray-1);
    color: var(--black);
    min-height: 100vh;
    padding-bottom: 90px;
  }
  header {
    background: var(--white);
    border-bottom: 1px solid var(--gray-2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header img { height: 24px; }
  header span {
    font-size: 13px;
    font-weight: 700;
    color: var(--black);
    margin-left: 4px;
  }

  .section {
    background: var(--white);
    margin: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--gray-2);
    overflow: hidden;
  }
  .sec-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--gray-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sec-head h2 {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sec-head small { font-size: 11px; color: var(--gray-3); }

  .field {
    padding: 13px 16px;
    border-bottom: 1px solid var(--gray-1);
  }
  .field:last-child { border-bottom: none; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .field select, .field input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--gray-2);
    border-radius: 6px;
    font-size: 15px;
    font-family: var(--font);
    background: var(--white);
    color: var(--black);
    -webkit-appearance: none;
  }
  .field select:focus, .field input:focus {
    outline: none;
    border-color: var(--orange);
  }

  /* Staff */
  .staff-list { padding: 6px 16px 4px; }
  .staff-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--gray-1);
  }
  .staff-item:last-child { border-bottom: none; }
  .staff-name {
    flex: 1;
    font-size: 14px;
    color: var(--black);
  }
  .staff-item input {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid var(--gray-2);
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--font);
  }
  .staff-item input:focus { outline: none; border-color: var(--orange); }

  .btn-remove {
    width: 28px; height: 28px;
    border: none;
    background: #fdecea;
    color: var(--red);
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-add {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--gray-2);
    background: none;
    color: var(--orange);
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    margin: 8px 0 12px;
  }

  /* Charges */
  .charge-item {
    display: grid;
    grid-template-columns: 1fr auto 80px auto;
    gap: 8px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--gray-1);
  }
  .charge-item:last-child { border-bottom: none; }
  .charge-item input {
    padding: 7px 10px;
    border: 1px solid var(--gray-2);
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font);
  }
  .charge-item input:focus { outline: none; border-color: var(--orange); }
  .charge-item .rs { font-size: 13px; color: var(--gray-3); font-weight: 600; }

  /* PIN Reset */
  .btn-reset {
    width: 100%;
    padding: 11px;
    background: none;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .info-text {
    font-size: 12px;
    color: var(--gray-3);
    padding: 10px 16px;
    line-height: 1.5;
  }

  /* Save bar */
  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--gray-2);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
  }
  .btn-save {
    width: 100%;
    padding: 14px;
    background: var(--orange);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-save:active { opacity: 0.85; }

  .toast {
    position: fixed;
    top: 68px; left: 50%;
    transform: translateX(-50%);
    background: var(--black);
    color: var(--white);
    padding: 9px 18px;
    border-radius: 18px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <img src="https://koffykraft.github.io/tagro-site/assets/logos/tagro-logo.png" alt="TAGRO">
  <span>Branch Config</span>
</header>

<!-- Branch -->
<div class="section">
  <div class="sec-head"><h2>This Branch</h2></div>
  <div class="field">
    <label>Branch</label>
    <select id="branch-code" onchange="onBranchChange()">
      <option value="">Select branch</option>
      <option value="KVR">KVR — Karavaloor</option>
      <option value="NDD">NDD — Nedumangad</option>
      <option value="PKM">PKM — Ponkunnam</option>
      <option value="OYR">OYR — Oyoor</option>
      <option value="SDM">SDM — Sadanandapuram</option>
      <option value="MDM">MDM — Marthandam</option>
      <option value="SKT">SKT — Shencottai</option>
    </select>
  </div>
</div>

<!-- Staff -->
<div class="section">
  <div class="sec-head">
    <h2>Staff</h2>
    <small>Auto-filled by branch</small>
  </div>
  <div class="staff-list" id="staff-list"></div>
  <div style="padding:0 16px;">
    <button class="btn-add" onclick="addStaff()">+ Add staff member</button>
  </div>
</div>

<!-- Labour Charges -->
<div class="section">
  <div class="sec-head">
    <h2>Labour Charges</h2>
    <small>Default rates</small>
  </div>
  <p class="info-text">Staff can adjust per job if needed.</p>
  <div id="charges-list"></div>
  <div style="padding:0 16px;">
    <button class="btn-add" onclick="addCharge()">+ Add service type</button>
  </div>
</div>

<!-- PIN Reset -->
<div class="section">
  <div class="sec-head">
    <h2>Reset Staff PIN</h2>
  </div>
  <p class="info-text">Select a staff member and reset their PIN. They create a new one on next login.</p>
  <div class="field">
    <select id="reset-select">
      <option value="">Select staff member</option>
    </select>
  </div>
  <div class="field">
    <button class="btn-reset" onclick="resetPIN()">Reset PIN</button>
  </div>
</div>

<div class="save-bar">
  <button class="btn-save" onclick="saveConfig()">Save</button>
</div>

<div class="toast" id="toast"></div>

<script>
const BRANCH_STAFF = {
  KVR: ['Rajeev', 'Anandu', 'Thankachan'],
  PKM: ['Anoop P G'],
  MDM: ['John Victor'],
  SKT: ['Mahalakshmi', 'Jothi'],
  NDD: [], OYR: [], SDM: []
};

const DEFAULT_CHARGES = [
  { name: 'Full Service', amount: 3000 },
  { name: 'Carburetor Service', amount: 300 },
  { name: 'Carburetor Repairs', amount: 500 },
  { name: 'Clutch Assembly Replacement', amount: 250 },
  { name: 'Piston Replaced', amount: 500 },
];

function getConfig() { try { return JSON.parse(localStorage.getItem('tagro_config')||'{}') } catch { return {} } }
function getToken() { return localStorage.getItem('dbx_token') || ''; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function onBranchChange() {
  const branch = document.getElementById('branch-code').value;
  const staff = BRANCH_STAFF[branch] || [];
  renderStaff(staff);
  renderResetDropdown(staff);
}

function renderStaff(names) {
  const list = document.getElementById('staff-list');
  list.innerHTML = '';
  names.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'staff-item';
    div.innerHTML = `
      <input type="text" value="${name}" data-staff="${i}" placeholder="Name">
      <button class="btn-remove" onclick="removeStaff(${i})">×</button>`;
    list.appendChild(div);
  });
}

function addStaff() {
  const inputs = [...document.querySelectorAll('[data-staff]')];
  const names = inputs.map(i => i.value.trim());
  names.push('');
  renderStaff(names);
  const all = document.querySelectorAll('[data-staff]');
  all[all.length-1].focus();
}

function removeStaff(idx) {
  const names = [...document.querySelectorAll('[data-staff]')]
    .map(i => i.value.trim()).filter((_,i) => i !== idx);
  renderStaff(names);
}

function renderResetDropdown(names) {
  const sel = document.getElementById('reset-select');
  sel.innerHTML = '<option value="">Select staff member</option>';
  names.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n; sel.appendChild(o);
  });
}

function renderCharges(charges) {
  const list = document.getElementById('charges-list');
  list.innerHTML = '';
  charges.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'charge-item';
    div.innerHTML = `
      <input type="text" value="${ch.name}" data-cn="${i}" placeholder="Service name">
      <span class="rs">₹</span>
      <input type="number" value="${ch.amount}" data-ca="${i}" style="text-align:right;">
      <button class="btn-remove" onclick="removeCharge(${i})">×</button>`;
    list.appendChild(div);
  });
}

function addCharge() {
  const names = [...document.querySelectorAll('[data-cn]')].map(i => i.value);
  const amts = [...document.querySelectorAll('[data-ca]')].map(i => parseInt(i.value)||0);
  const charges = names.map((n,i) => ({name:n, amount:amts[i]}));
  charges.push({name:'', amount:0});
  renderCharges(charges);
}

function removeCharge(idx) {
  const names = [...document.querySelectorAll('[data-cn]')].map(i => i.value);
  const amts = [...document.querySelectorAll('[data-ca]')].map(i => parseInt(i.value)||0);
  const charges = names.map((n,i) => ({name:n, amount:amts[i]})).filter((_,i) => i!==idx);
  renderCharges(charges.length ? charges : [{name:'',amount:0}]);
}

function resetPIN() {
  const name = document.getElementById('reset-select').value;
  if (!name) { showToast('Select a staff member'); return; }
  const cfg = getConfig();
  const key = cfg.branch + '_' + name.replace(/\s+/g,'_');
  const users = JSON.parse(localStorage.getItem('tagro_users')||'{}');
  delete users[key];
  localStorage.setItem('tagro_users', JSON.stringify(users));
  showToast(name + ' PIN reset');
}

async function saveConfig() {
  const branch = document.getElementById('branch-code').value;
  if (!branch) { showToast('Select a branch'); return; }

  const staff = [...document.querySelectorAll('[data-staff]')]
    .map(i => i.value.trim()).filter(Boolean);

  const names = [...document.querySelectorAll('[data-cn]')].map(i => i.value.trim());
  const amts = [...document.querySelectorAll('[data-ca]')].map(i => parseInt(i.value)||0);
  const charges = names.map((n,i) => ({name:n, amount:amts[i]})).filter(c => c.name);

  const BRANCHES = {
    KVR:'Karavaloor', NDD:'Nedumangad', PKM:'Ponkunnam',
    OYR:'Oyoor', SDM:'Sadanandapuram', MDM:'Marthandam', SKT:'Shencottai'
  };

  const config = {
    branch, branchName: BRANCHES[branch],
    staff, charges,
    savedAt: new Date().toISOString(),
    formVersion: '1.0'
  };

  localStorage.setItem('tagro_config', JSON.stringify(config));

  // Sync to Dropbox if token present
  const token = getToken();
  if (token) {
    try {
      await fetch('https://content.dropboxapi.com/2/files/upload', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/octet-stream',
          'Dropbox-API-Arg': JSON.stringify({
            path: `/TAGRO-Service/${branch}/config.json`,
            mode: 'overwrite'
          })
        },
        body: JSON.stringify(config, null, 2)
      });
      showToast('Saved and synced to Dropbox');
    } catch {
      showToast('Saved locally');
    }
  } else {
    showToast('Saved');
  }

  renderResetDropdown(staff);
}

// Init
function init() {
  const cfg = getConfig();
  if (cfg.branch) {
    document.getElementById('branch-code').value = cfg.branch;
    const staff = cfg.staff || BRANCH_STAFF[cfg.branch] || [];
    renderStaff(staff);
    renderResetDropdown(staff);
    renderCharges(cfg.charges || DEFAULT_CHARGES);
  } else {
    renderCharges(DEFAULT_CHARGES);
  }
}

init();
</script>
</body>
</html>
