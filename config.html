<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TAGRO — Config</title><link rel="stylesheet" href="app.css"></head><body><script src="app.js"></script><header><img src="https://koffykraft.github.io/tagro-site/assets/logos/tagro-logo.png"><span class="tag">CONFIG</span></header><main class="wrap"><div class="danger-note">Use this once per device. Manager/owner control should be added before staff phones can access this page freely.</div><div class="section"><div class="head">Branch</div><div class="field"><label>This device belongs to</label><select id="branch" onchange="loadBranch()"><option value="">Select branch</option></select></div></div><div class="section"><div class="head"><span>Staff</span><button class="btn" onclick="addStaff()">+ Staff</button></div><div id="staff"></div></div><div class="section"><div class="head"><span>Labour Charges</span><button class="btn" onclick="addCharge()">+ Charge</button></div><div id="charges"></div></div><div class="section"><div class="head">Reset Staff PIN</div><div class="field"><select id="reset"></select></div><div class="field"><button class="btn red" onclick="resetPIN()">Reset Selected PIN</button></div></div></main><div class="bottom"><button class="btn primary" onclick="save()">Save Config</button><a class="btn dark" href="login.html" style="text-align:center;text-decoration:none">Login</a></div><div id="toast" class="toast"></div><script>let staff=[],charges=[];function init(){Object.entries(TAGRO.branches).forEach(([k,v])=>$('branch').add(new Option(`${k} — ${v}`,k)));const c=cfg();if(c.branch){$('branch').value=c.branch;staff=c.staff||TAGRO.defaultStaff[c.branch]||[];charges=c.charges||TAGRO.charges}else{charges=TAGRO.charges}render()}function loadBranch(){const b=$('branch').value;staff=[...(TAGRO.defaultStaff[b]||[])];renderStaff();renderReset()}function render(){renderStaff();renderCharges();renderReset()}function renderStaff(){$('staff').innerHTML=staff.map((n,i)=>`<div class="field row"><div><label>Name</label><input value="${n}" onchange="staff[${i}]=this.value"></div><div><label>&nbsp;</label><button class="btn red" onclick="staff.splice(${i},1);renderStaff();renderReset()">Remove</button></div></div>`).join('')}function addStaff(){staff.push('');renderStaff()}function renderCharges(){$('charges').innerHTML=charges.map((c,i)=>`<div class="field row"><div><label>Service</label><input value="${c.name}" onchange="charges[${i}].name=this.value"></div><div><label>Amount</label><input type="number" value="${c.amount}" onchange="charges[${i}].amount=+this.value"></div></div>`).join('')}function addCharge(){charges.push({name:'',amount:0});renderCharges()}function renderReset(){$('reset').innerHTML='<option value="">Select staff</option>'+staff.filter(Boolean).map(n=>`<option>${n}</option>`).join('')}function resetPIN(){const name=$('reset').value,b=$('branch').value;if(!name)return toast('Select staff');let u=read('tagro_users',{});delete u[userKey(b,name)];write('tagro_users',u);toast('PIN reset')}function save(){const b=$('branch').value;if(!b)return toast('Select branch');const config={branch:b,branchName:TAGRO.branches[b],staff:staff.filter(Boolean),charges:charges.filter(x=>x.name),savedAt:new Date().toISOString(),formVersion:'2.0'};write('tagro_config',config);toast('Config saved')}init()</script></body></html>
