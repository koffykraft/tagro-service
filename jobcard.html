<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TAGRO — Job Card</title><link rel="stylesheet" href="app.css"></head><body><script src="app.js"></script><script>const me=requireAuth('jobcard.html');header('job')</script><div class="steps"><div class="step active" id="t1">1 Customer</div><div class="step" id="t2">2 Machine</div><div class="step" id="t3">3 Job</div><div class="step" id="t4">4 Parts</div><div class="step" id="t5">5 Delivery</div></div><main class="wrap"><section class="screen active" id="s1"><div class="card"><div class="head"><span>Work Order</span><b class="mono" id="wo"></b></div><div class="row"><div class="field"><label>Accepted by</label><input id="accepted" readonly></div><div class="field"><label>Date</label><input id="date" type="date"></div></div></div><div class="section"><div class="head">Customer</div><div class="field"><label>Phone</label><input id="phone" type="tel" placeholder="Mobile number" oninput="lookupCustomer()"></div><div id="history" class="danger-note" style="display:none"></div><div class="field"><label>Name</label><input id="name" placeholder="Full name"></div><div class="row"><div class="field"><label>Place</label><input id="place"></div><div class="field"><label>Address</label><input id="address"></div></div></div></section><section class="screen" id="s2"><div class="section"><div class="head">Machine</div><div class="field"><label>Model</label><select id="model"><option value="">Select model</option><optgroup label="Chainsaw"><option>MS 180</option><option>MS 182</option><option>MS 250</option><option>MS 382</option><option>MS 462</option></optgroup><optgroup label="Brushcutter"><option>FS 120</option><option>FS 250</option></optgroup><optgroup label="Sprayer / Blower"><option>SR 420</option><option>SR 450</option><option>BR 600</option></optgroup><option>Other</option></select></div><div class="field"><label>Serial Number</label><input id="serial" autocapitalize="characters"></div><div class="field"><label>Sale Type</label><div class="optrow"><button class="opt on" data-g="sale">TAGRO Sale</button><button class="opt" data-g="sale">Other Dealer</button><button class="opt" data-g="sale">Warranty</button></div></div></div><div class="section"><div class="head">Arrival Condition</div><div class="field"><div class="optrow"><button class="opt" data-g="cond">Bar received</button><button class="opt" data-g="cond">Chain received</button><button class="opt" data-g="cond">Fuel present</button><button class="opt" data-g="cond">Damage visible</button></div></div><div class="grid3" style="padding:12px 14px"><label class="photo"><span>Front<br>Photo</span><input type="file" accept="image/*" capture="environment" onchange="photo(this,'front')"></label><label class="photo"><span>Serial<br>Plate</span><input type="file" accept="image/*" capture="environment" onchange="photo(this,'serial')"></label><label class="photo"><span>Damage<br>Photo</span><input type="file" accept="image/*" capture="environment" onchange="photo(this,'damage')"></label></div></div></section><section class="screen" id="s3"><div class="section"><div class="head">Complaint & Observation</div><div class="field"><label>Complaint as stated</label><textarea id="complaint"></textarea></div><div class="field"><label>Our observation</label><textarea id="observe"></textarea></div><div class="field"><label>Job Type</label><div class="optrow"><button class="opt" data-g="jobtype">Full Service</button><button class="opt" data-g="jobtype">Free Service</button><button class="opt on" data-g="jobtype">Repair</button></div></div></div><div class="section"><div class="head">Work Performed</div><div class="field"><label>Work Done</label><textarea id="work"></textarea></div><div class="row"><div class="field"><label>Repaired by</label><select id="repaired"></select></div><div class="field"><label>Repair date</label><input id="repairDate" type="date"></div></div></div></section><section class="screen" id="s4"><div class="section"><div class="head"><span>Parts Used / Required</span><button class="btn" onclick="addPart()">+ Part</button></div><div style="padding:12px 14px"><input id="partSearch" placeholder="Search part no, description or model" oninput="renderPartSuggestions()"><div id="suggestions" class="list" style="margin-top:8px"></div></div><div style="overflow:auto"><table class="table"><thead><tr><th>Part</th><th>Qty</th><th>Rate</th><th>Stock</th><th>PO</th><th></th></tr></thead><tbody id="partsBody"></tbody></table></div></div><div class="section"><div class="head">Billing</div><div class="row"><div class="field"><label>Invoice No.</label><input id="invoice"></div><div class="field"><label>Service Charges</label><input id="service" type="number" placeholder="0"></div></div><div class="field"><label>Quick labour</label><div class="optrow" id="charges"></div></div><div class="field"><label>Total Estimate</label><input id="total" readonly></div></div></section><section class="screen" id="s5"><div class="section"><div class="head">Delivery</div><div class="row"><div class="field"><label>Returned by</label><select id="returned"></select></div><div class="field"><label>Return Date</label><input id="returnDate" type="date"></div></div><div class="field"><label>Collected by</label><input id="collected"></div><div class="field"><label>Machine demonstrated</label><div class="optrow"><button class="opt on" data-g="demo">Demonstrated</button><button class="opt" data-g="demo">Representative collecting</button></div></div></div><div class="section"><div class="head">Completion Checklist</div><div class="field"><div class="optrow"><button class="opt" data-g="check">Test run</button><button class="opt" data-g="check">Idle adjusted</button><button class="opt" data-g="check">Leak checked</button><button class="opt" data-g="check">Customer informed</button></div></div><div class="field"><label>Advisory / Additional issue</label><textarea id="advisory"></textarea></div></div></section></main><div class="bottom"><button class="btn" id="back" onclick="prev()" style="display:none">Back</button><button class="btn primary" id="next" onclick="next()">Next</button><button class="btn green" id="save" onclick="saveJob()" style="display:none">Save Job Card</button></div><div id="toast" class="toast"></div><script>let step=1,wo=nextWO(cfg().branch),photos={},parts=[];function fillStaff(){const c=cfg(),st=staffForBranch(c.branch);$('accepted').value=me.name||'';['repaired','returned'].forEach(id=>{const s=$(id);s.innerHTML='<option value="">Select</option>';st.forEach(n=>s.add(new Option(n,n)));if(id==='returned')s.value=me.name||''})}function sel(g){return document.querySelector(`[data-g="${g}"].on`)?.textContent.trim()||''}document.addEventListener('click',e=>{if(!e.target.classList.contains('opt'))return;const g=e.target.dataset.g;if(!g)return;if(['cond','check'].includes(g)){e.target.classList.toggle('on');return}document.querySelectorAll(`[data-g="${g}"]`).forEach(b=>b.classList.remove('on'));e.target.classList.add('on')});function today(){return new Date().toISOString().split('T')[0]}function photo(input,slot){const f=input.files[0];if(!f)return;photos[slot]=f;const box=input.parentElement, r=new FileReader();r.onload=e=>{box.classList.add('done');box.insertAdjacentHTML('beforeend',`<img src="${e.target.result}">`)};r.readAsDataURL(f)}function lookupCustomer(){const p=$('phone').value.trim();if(p.length<6)return $('history').style.display='none';const found=jobs().filter(j=>j.customer?.phone?.includes(p)).slice(-5).reverse();if(!found.length)return $('history').style.display='none';$('history').style.display='block';$('history').innerHTML='<b>Previous history found</b><br>'+found.map(j=>`${j.workOrder} · ${j.machine?.model||''} · ${j.job?.complaint||''}`).join('<br>');let last=found[0];$('name').value||=last.customer?.name||'';$('place').value||=last.customer?.place||'';$('address').value||=last.customer?.address||''}function renderPartSuggestions(){const q=$('partSearch').value;if(q.length<2)return $('suggestions').innerHTML='';$('suggestions').innerHTML=partFind(q).map((p,i)=>`<button class="btn" onclick="choosePart('${p.partNo}')"><b>${p.desc}</b><br><span class="mini muted">${p.partNo} · ${p.models} · ₹${p.price}</span></button>`).join('')}function choosePart(partNo){const p=TAGRO.parts.find(x=>x.partNo===partNo);parts.push({partNo:p.partNo,desc:p.desc,qty:1,price:p.price,po:false});$('partSearch').value='';$('suggestions').innerHTML='';renderParts()}function addPart(){parts.push({partNo:'',desc:'',qty:1,price:0,po:false});renderParts()}function renderParts(){const b=$('partsBody'),br=cfg().branch;b.innerHTML=parts.map((p,i)=>{const own=stockOf(br,p.partNo),others=allStock(p.partNo).filter(x=>x.branch!==br).map(x=>x.branch+':'+x.qty).join(' ');return `<tr><td><input value="${p.partNo}" placeholder="Part No" onchange="parts[${i}].partNo=this.value"><input value="${p.desc}" placeholder="Description" onchange="parts[${i}].desc=this.value" style="margin-top:5px"></td><td><input type="number" min="1" value="${p.qty}" onchange="parts[${i}].qty=+this.value;renderParts()"></td><td><input type="number" value="${p.price}" onchange="parts[${i}].price=+this.value;calc()"></td><td class="mini">Own: ${own}<br>${others||'No other stock'}</td><td><input type="checkbox" ${p.po?'checked':''} onchange="parts[${i}].po=this.checked"></td><td><button class="btn red" onclick="parts.splice(${i},1);renderParts()">×</button></td></tr>`}).join('');calc()}function calc(){const partTotal=parts.reduce((s,p)=>s+(+p.qty||0)*(+p.price||0),0),svc=+$('service').value||0;$('total').value='₹ '+(partTotal+svc).toLocaleString('en-IN')}function show(){for(let i=1;i<=5;i++){$('s'+i).classList.toggle('active',i===step);$('t'+i).className='step '+(i===step?'active':i<step?'done':'')}$('back').style.display=step>1?'block':'none';$('next').style.display=step<5?'block':'none';$('save').style.display=step===5?'block':'none';scrollTo(0,0)}function next(){if(step===1&&(!$('name').value.trim()||!$('phone').value.trim()))return toast('Enter customer name and phone');if(step===2&&!$('model').value)return toast('Select machine model');step++;show()}function prev(){step--;show()}function saveJob(){const c=cfg(),job={workOrder:wo,branch:c.branch,branchName:c.branchName,date:new Date().toISOString(),acceptedBy:$('accepted').value,loggedBy:me.name,status:'Waiting',customer:{name:$('name').value.trim(),phone:$('phone').value.trim(),place:$('place').value.trim(),address:$('address').value.trim()},machine:{model:$('model').value,serialNo:$('serial').value.trim(),saleType:sel('sale')},job:{complaint:$('complaint').value.trim(),observations:$('observe').value.trim(),jobType:sel('jobtype'),workDone:$('work').value.trim(),repairedBy:$('repaired').value,repairDate:$('repairDate').value},parts,billing:{invoiceNo:$('invoice').value.trim(),serviceCharges:$('service').value,total:$('total').value},delivery:{returnedBy:$('returned').value,returnDate:$('returnDate').value,collectedBy:$('collected').value.trim(),demo:sel('demo')},advisory:$('advisory').value.trim(),checklist:[...document.querySelectorAll('[data-g="check"].on')].map(x=>x.textContent.trim()),photos:Object.keys(photos),formVersion:'2.0'};if(me.role==='training'){job.training=true;const tj=read('tagro_training_jobs',[]);tj.push(job);write('tagro_training_jobs',tj);toast('Practice job saved separately');setTimeout(()=>location.reload(),900);return}const j=jobs();j.push(job);saveJobs(j);const r=reqs();parts.filter(p=>p.po).forEach(p=>r.push({id:Date.now()+'_'+Math.random().toString(16).slice(2),workOrder:wo,branch:c.branch,customer:job.customer.name,machine:job.machine.model,partNo:p.partNo,desc:p.desc,qty:p.qty,price:p.price,urgency:'Machine waiting',status:'Open',createdAt:new Date().toISOString()}));saveReqs(r);toast('Saved');setTimeout(()=>location.reload(),900)}function init(){const c=cfg();$('wo').textContent=wo;$('date').value=today();$('repairDate').value=today();$('returnDate').value=today();fillStaff();(c.charges||TAGRO.charges).forEach(ch=>{let b=document.createElement('button');b.className='btn';b.textContent=`${ch.name} ₹${ch.amount}`;b.onclick=()=>{$('service').value=ch.amount;calc()};$('charges').appendChild(b)});$('service').oninput=calc;show()}init()</script></body></html>
