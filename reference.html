            status.innerHTML = "<strong>ERROR:</strong> TAGRO object is missing from app.js!";
        } else if (!TAGRO.parts || TAGRO.parts.length === 0) {
            status.innerHTML = "<strong>OK:</strong> TAGRO found, but TAGRO.parts is EMPTY.";
        } else {
            status.innerHTML = "<strong>SUCCESS:</strong> Found " + TAGRO.parts.length + " parts. (This should be working!)";

    </script>
