```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAGRO Reference</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="wrap">
        <h2>Parts List</h2>
        <div id="list"></div>
    </div>

    <script src="app.js"></script>
    <script>
        // This takes the list of parts already inside your app
        // and puts them on the screen immediately.
        const list = document.getElementById('list');
        const parts = TAGRO.parts || []; 

        list.innerHTML = parts.map(p => `
            <div class="card" style="margin-bottom: 10px; padding: 15px;">
                <strong>${p.name}</strong><br>
                <small>${p.no}</small>
                <div style="float: right; font-weight: bold;">₹${p.price}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
