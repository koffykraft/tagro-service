<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TAGRO Service Login</title><link rel="stylesheet" href="app.css"><style>body{display:flex;align-items:center;justify-content:center;background:#fff;padding:40px 24px}.login{width:100%;max-width:320px;text-align:center}.logo{height:30px;margin-bottom:8px}h1{font-size:13px;color:#999;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:4px}h2{font-size:11px;color:#ccc;text-transform:uppercase;letter-spacing:2px;margin-bottom:42px}.form{display:flex;flex-direction:column;gap:14px}#pin{letter-spacing:6px;text-align:center;font-size:18px}.error{min-height:18px;color:var(--red);font-size:12px}.small{font-size:11px;color:#999}.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}.key{padding:18px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:20px}.dots{display:flex;justify-content:center;gap:12px;margin:18px 0}.dot{width:12px;height:12px;border:2px solid var(--line);border-radius:50%}.dot.on{background:var(--orange);border-color:var(--orange)}.hide{display:none}</style></head><body><main class="login"><img class="logo" src="https://koffykraft.github.io/tagro-site/assets/logos/tagro-logo.png"><h1>Thumpassery Agro</h1><h2>Service Records</h2><section id="loginScreen"><div class="form"><select id="staff"><option value="">Select your name</option></select><input type="password" id="pin" placeholder="PIN" maxlength="4" inputmode="numeric"><div class="error" id="err"></div><button class="btn dark" onclick="tryLogin()">Enter</button><div class="small">Managers and staff are listed. Forgot PIN? Ask manager to reset in Config.</div></div></section><section id="createScreen" class="hide"><h3>Create your 4 digit PIN</h3><p class="small">First login on this device.</p><div class="dots"><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i></div><div class="pinpad" id="pad"></div><div class="error" id="cerr"></div></section></main><script src="app.js"></script><script>let first='',confirming=false,entry='';function init(){const c=cfg();if(!c.branch){document.querySelector('.login').innerHTML='<img class="logo" src="https://koffykraft.github.io/tagro-site/assets/logos/tagro-logo.png"><h1>Device not set up</h1><p class="small">Open config.html and select this branch.</p><br><a class="btn dark" href="config.html">Open Config</a>';return}const sel=$('staff');sel.add(new Option('T M Thomas — Owner / All Branches','__OWNER__'));sel.add(new Option('Demo — Practice PIN 1234','__TRAINING__'));staffForBranch(c.branch).forEach(n=>sel.add(new Option(n,n)));$('pin').onkeydown=e=>{if(e.key==='Enter')tryLogin()};buildPad()}function users(){return read('tagro_users',{})}function saveUsers(u){write('tagro_users',u)}function tryLogin(){const c=cfg(),raw=$('staff').value,pin=$('pin').value,u=users();$('err').textContent='';if(!raw)return $('err').textContent='Select your name';if(pin.length!==4)return $('err').textContent='Enter 4 digit PIN';const isOwner=raw==='__OWNER__';const isTraining=raw==='__TRAINING__';const name=isOwner?'T M Thomas':isTraining?'Demo':raw;if(isTraining){if(pin==='1234'){setSess({name,branch:c.branch,role:'training',mode:'training'});location.href='home.html'}else{$('err').textContent='Practice PIN is 1234'}return}const k=isOwner?'OWNER_T_M_Thomas':userKey(c.branch,name);if(!u[k])return showCreate();if(u[k].pin===pinHash(pin)){setSess(isOwner?{name,branch:'ALL',role:'owner'}:{name,branch:c.branch,role:'staff'});location.href=new URLSearchParams(location.search).get('redirect')||(isOwner?'home.html':'home.html')}else{$('err').textContent='Wrong PIN';$('pin').value=''}}function showCreate(){$('loginScreen').classList.add('hide');$('createScreen').classList.remove('hide');first='';entry='';confirming=false;updateDots()}function buildPad(){const pad=$('pad');['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(x=>{const b=document.createElement('button');b.className='key';b.textContent=x;if(x)b.onclick=()=>tap(x);pad.appendChild(b)})}function tap(x){if(x==='⌫'){entry=entry.slice(0,-1);return updateDots()}if(entry.length<4)entry+=x;updateDots();if(entry.length===4)setTimeout(nextPin,150)}function updateDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i<entry.length))}function nextPin(){if(!confirming){first=entry;entry='';confirming=true;$('createScreen').querySelector('h3').textContent='Confirm PIN';$('createScreen').querySelector('p').textContent='Enter the same PIN again.';updateDots();return}if(first!==entry){$('cerr').textContent='PINs did not match. Start again.';entry='';first='';confirming=false;setTimeout(()=>{$('cerr').textContent='';$('createScreen').querySelector('h3').textContent='Create your 4 digit PIN';updateDots()},900);return}const c=cfg(),raw=$('staff').value,isOwner=raw==='__OWNER__',name=isOwner?'T M Thomas':raw,u=users();if(isOwner){u['OWNER_T_M_Thomas']={name,branch:'ALL',role:'owner',pin:pinHash(entry)}}else{u[userKey(c.branch,name)]={name,branch:c.branch,role:'staff',pin:pinHash(entry)}}saveUsers(u);setSess(isOwner?{name,branch:'ALL',role:'owner'}:{name,branch:c.branch,role:'staff'});location.href='home.html'}init()</script></body></html>
