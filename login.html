<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>TAGRO Service</title>
<link rel="stylesheet" href="app.css">
<style>
body { background:#f0f0f0; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:0; }
.login-wrap { width:100%; max-width:400px; padding:24px 20px 40px; }
.brand { text-align:center; margin-bottom:32px; }
.brand-logo { font-size:36px; font-weight:900; font-style:italic; letter-spacing:-2px; color:#121212; }
.brand-logo span { color:#df6427; font-style:normal; }
.brand-sub { font-size:11px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:#aaa; margin-top:6px; }
.branch-tag { display:inline-block; background:#df6427; color:#fff; font-size:13px; font-weight:900; padding:5px 14px; border-radius:99px; margin-top:10px; }
.login-card { background:#fff; border-radius:20px; padding:28px 24px; box-shadow:0 4px 32px rgba(0,0,0,.08); }
.login-title { font-size:13px; font-weight:900; color:#aaa; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:20px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:11px; font-weight:900; color:#aaa; letter-spacing:.8px; text-transform:uppercase; margin-bottom:8px; }
.field select, .field input { width:100%; padding:14px; border:1.5px solid #e8e8e8; border-radius:12px; font-size:16px; font-family:inherit; background:#fff; color:#121212; outline:none; transition:border-color .2s; }
.field select:focus, .field input:focus { border-color:#df6427; }
.pin-wrap { position:relative; }
.pin-wrap input { letter-spacing:8px; font-size:22px; font-weight:900; text-align:center; padding-right:48px; }
.pin-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:#aaa; }
.btn-login { width:100%; padding:16px; background:#df6427; color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:900; cursor:pointer; margin-top:8px; transition:background .2s; }
.btn-login:hover { background:#c4551f; }
.btn-login:active { transform:scale(.98); }
.divider { text-align:center; color:#ccc; font-size:12px; margin:16px 0; }
.btn-otp { width:100%; padding:14px; background:#f5f5f5; color:#555; border:1.5px solid #e8e8e8; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; }
.btn-otp:hover { background:#ffe8da; border-color:#df6427; color:#df6427; }
.otp-section { display:none; margin-top:16px; }
.otp-section.show { display:block; }
.otp-hint { font-size:13px; color:#888; text-align:center; margin-bottom:12px; line-height:1.5; }
.otp-hint b { color:#df6427; }
.owner-link { text-align:center; margin-top:20px; }
.owner-link button { background:none; border:none; color:#aaa; font-size:13px; cursor:pointer; text-decoration:underline; }
.toast { position:fixed; top:24px; left:50%; transform:translateX(-50%); background:#121212; color:#fff; padding:12px 20px; border-radius:99px; font-size:13px; font-weight:800; opacity:0; transition:.2s; z-index:100; white-space:nowrap; }
.toast.show { opacity:1; }
.error-msg { color:#ba3327; font-size:13px; text-align:center; margin-top:8px; min-height:20px; }
.step { display:none; }
.step.active { display:block; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo"><span>▰</span>TAGRO</div>
    <div class="brand-sub">Service Centre</div>
    <div class="branch-tag" id="branch-tag">Loading...</div>
  </div>

  <div class="login-card">

    <!-- STEP 1: Select staff + PIN -->
    <div class="step active" id="step-select">
      <div class="login-title">Staff Login</div>

      <div class="field">
        <label>Your Name</label>
        <select id="staff-select" onchange="onStaffChange()">
          <option value="">Select your name</option>
        </select>
      </div>

      <div class="field" id="pin-field" style="display:none">
        <label>PIN</label>
        <div class="pin-wrap">
          <input type="password" inputmode="numeric" maxlength="6" id="pin-input"
            placeholder="• • • • • •"
            onkeydown="if(event.key==='Enter')doLogin()"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          <button class="pin-toggle" onclick="togglePin()" id="pin-eye">👁</button>
        </div>
        <div class="error-msg" id="pin-error"></div>
      </div>

      <button class="btn-login" id="btn-login" style="display:none" onclick="doLogin()">
        Login
      </button>

      <div class="divider" id="otp-divider" style="display:none">or</div>

      <button class="btn-otp" id="btn-get-pin" style="display:none" onclick="requestOTP()">
        Get PIN via SMS
      </button>
    </div>

    <!-- STEP 2: Enter OTP sent via SMS -->
    <div class="step" id="step-otp">
      <div class="login-title">Verify Phone</div>
      <div class="otp-hint">A 6-digit code was sent to<br><b id="otp-phone-display"></b></div>
      <div class="field">
        <label>Enter Code</label>
        <div class="pin-wrap">
          <input type="text" inputmode="numeric" maxlength="6" id="otp-input"
            placeholder="6-digit code"
            style="letter-spacing:6px;font-size:22px;font-weight:900;text-align:center"
            onkeydown="if(event.key==='Enter')verifyOTP()">
        </div>
      </div>
      <div class="error-msg" id="otp-error"></div>
      <button class="btn-login" onclick="verifyOTP()">Verify</button>
      <div style="text-align:center;margin-top:12px">
        <button class="btn-otp" onclick="showStep('step-select')" style="width:auto;padding:10px 20px">Back</button>
        <button class="btn-otp" onclick="requestOTP()" style="width:auto;padding:10px 20px;margin-left:8px">Resend</button>
      </div>
    </div>

    <!-- STEP 3: Set new PIN after OTP verified -->
    <div class="step" id="step-set-pin">
      <div class="login-title">Set Your PIN</div>
      <div class="otp-hint">Choose a PIN you will remember.<br>You can change it any time.</div>
      <div class="field">
        <label>New PIN (4-6 digits)</label>
        <div class="pin-wrap">
          <input type="password" inputmode="numeric" maxlength="6" id="new-pin"
            placeholder="• • • • • •"
            style="letter-spacing:8px;font-size:22px;font-weight:900;text-align:center"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
      </div>
      <div class="field">
        <label>Confirm PIN</label>
        <div class="pin-wrap">
          <input type="password" inputmode="numeric" maxlength="6" id="confirm-pin"
            placeholder="• • • • • •"
            style="letter-spacing:8px;font-size:22px;font-weight:900;text-align:center"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')"
            onkeydown="if(event.key==='Enter')saveNewPin()">
        </div>
      </div>
      <div class="error-msg" id="set-pin-error"></div>
      <button class="btn-login" onclick="saveNewPin()">Save PIN and Login</button>
    </div>

  </div>

  <div class="owner-link">
    <button onclick="ownerLogin()">Owner / Admin access</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
// ── State ─────────────────────────────────────────────────
let selectedStaff = null;
let otpGenerated  = null;
let otpVerified   = false;

// ── Init ──────────────────────────────────────────────────
function init() {
  const branch = jget('tagro_device_branch', null);

  // Show session expired notice if redirected here due to expiry
  if (new URLSearchParams(location.search).get('expired') === '1') {
    showToast('Session expired after 12 hours. Please log in again.');
  }

  if (!branch) {
    // No branch configured — redirect to config
    document.getElementById('branch-tag').textContent = 'Not configured';
    showToast('Device not configured. Opening setup...');
    setTimeout(() => location.href = 'config.html', 1500);
    return;
  }

  document.getElementById('branch-tag').textContent =
    branch + ' — ' + (TAGRO.branches[branch] || branch);

  populateStaff();

  // Remember last login
  const last = jget('tagro_last_staff', null);
  if (last) {
    const sel = document.getElementById('staff-select');
    sel.value = last;
    if (sel.value) onStaffChange();
  }
}

// ── Populate staff from all branches ─────────────────────
function populateStaff() {
  const sel = document.getElementById('staff-select');
  sel.innerHTML = '<option value="">Select your name</option>';

  // Get staff from config (device-stored additions) + TAGRO defaults
  const configStaff = jget('tagro_staff_list', []);

  // Build full list: all TAGRO branches + config additions
  const allStaff = [];

  // Default staff from TAGRO object
  Object.entries(TAGRO.people).forEach(([branch, data]) => {
    const branchName = TAGRO.branches[branch] || branch;
    [data.manager, ...data.staff].forEach(name => {
      if (name && name !== 'Manager') {
        allStaff.push({ name, branch, branchName, phone: getStaffPhone(name) });
      }
    });
  });

  // Config-added staff (override or supplement)
  configStaff.forEach(s => {
    if (!allStaff.find(x => x.name === s.name)) {
      allStaff.push(s);
    }
  });

  // Sort by name
  allStaff.sort((a, b) => a.name.localeCompare(b.name));

  // Group by branch
  const byBranch = {};
  allStaff.forEach(s => {
    const key = s.branchName || s.branch;
    if (!byBranch[key]) byBranch[key] = [];
    byBranch[key].push(s);
  });

  Object.entries(byBranch).forEach(([bName, staffList]) => {
    const grp = document.createElement('optgroup');
    grp.label = bName;
    staffList.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      opt.dataset.phone = s.phone || '';
      opt.dataset.branch = s.branch || '';
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });

  // Store for lookup
  window._allStaff = allStaff;
}

function getStaffPhone(name) {
  const phones = jget('tagro_staff_phones', {});
  return phones[name] || '';
}

function onStaffChange() {
  const sel  = document.getElementById('staff-select');
  const name = sel.value;
  if (!name) {
    selectedStaff = null;
    document.getElementById('pin-field').style.display = 'none';
    document.getElementById('btn-login').style.display = 'none';
    document.getElementById('otp-divider').style.display = 'none';
    document.getElementById('btn-get-pin').style.display = 'none';
    return;
  }

  selectedStaff = window._allStaff.find(s => s.name === name) || { name };
  jset('tagro_last_staff', name);

  document.getElementById('pin-field').style.display = 'block';
  document.getElementById('btn-login').style.display = 'block';
  document.getElementById('otp-divider').style.display = 'block';
  document.getElementById('btn-get-pin').style.display = 'block';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
}

function togglePin() {
  const inp = document.getElementById('pin-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ── Login with PIN ────────────────────────────────────────
async function doLogin() {
  if (!selectedStaff) { showToast('Select your name first'); return; }

  const pin = document.getElementById('pin-input').value.trim();
  if (pin.length < 4) {
    document.getElementById('pin-error').textContent = 'PIN must be at least 4 digits';
    return;
  }

  const key   = 'pin_' + selectedStaff.name.replace(/\s+/g, '_');
  const stored = jget(key, null);

  if (!stored) {
    document.getElementById('pin-error').textContent = 'No PIN set. Use Get PIN via SMS.';
    return;
  }

  const hashed = await hashPin(pin);
  if (hashed !== stored) {
    document.getElementById('pin-error').textContent = 'Wrong PIN. Try again.';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
    return;
  }

  completeLogin();
}

// ── OTP flow ──────────────────────────────────────────────
async function requestOTP() {
  if (!selectedStaff) { showToast('Select your name first'); return; }

  const phone = selectedStaff.phone || getStaffPhone(selectedStaff.name);
  if (!phone) {
    showToast('No phone number registered. Contact manager.');
    return;
  }

  // Generate 6-digit OTP
  otpGenerated = String(Math.floor(100000 + Math.random() * 900000));

  // Send via Worker
  try {
    const resp = await fetch('https://tagro-api.icy-fire-d2ac.workers.dev/sms/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        phone,
        message: `TAGRO Service: Your login code is ${otpGenerated}. Valid for 10 minutes.`
      })
    });
    const result = await resp.json();
    if (!result.ok) throw new Error('SMS failed');
  } catch(e) {
    // In dev / offline: show OTP as toast for testing
    showToast('Code: ' + otpGenerated + ' (SMS failed, use this)');
  }

  document.getElementById('otp-phone-display').textContent = phone;
  showStep('step-otp');
  setTimeout(() => document.getElementById('otp-input').focus(), 200);

  // OTP expires in 10 minutes
  setTimeout(() => { otpGenerated = null; }, 10 * 60 * 1000);
}

function verifyOTP() {
  const entered = document.getElementById('otp-input').value.trim();
  if (!otpGenerated) {
    document.getElementById('otp-error').textContent = 'Code expired. Request a new one.';
    return;
  }
  if (entered !== otpGenerated) {
    document.getElementById('otp-error').textContent = 'Wrong code. Try again.';
    return;
  }
  otpVerified = true;
  otpGenerated = null;

  // Check if they already have a PIN — if yes, just login
  const key = 'pin_' + selectedStaff.name.replace(/\s+/g, '_');
  const stored = jget(key, null);
  if (stored) {
    // Already has PIN, verified via OTP — direct login
    completeLogin();
  } else {
    // No PIN yet — ask them to set one
    showStep('step-set-pin');
    setTimeout(() => document.getElementById('new-pin').focus(), 200);
  }
}

async function saveNewPin() {
  const np = document.getElementById('new-pin').value.trim();
  const cp = document.getElementById('confirm-pin').value.trim();

  if (np.length < 4) {
    document.getElementById('set-pin-error').textContent = 'PIN must be at least 4 digits';
    return;
  }
  if (np !== cp) {
    document.getElementById('set-pin-error').textContent = 'PINs do not match';
    return;
  }

  const hashed = await hashPin(np);
  const key    = 'pin_' + selectedStaff.name.replace(/\s+/g, '_');
  jset(key, hashed);

  showToast('PIN saved');
  completeLogin();
}

// ── Complete login ────────────────────────────────────────
function completeLogin() {
  const deviceBranch = jget('tagro_device_branch', 'KVR');
  const branchName   = TAGRO.branches[deviceBranch] || deviceBranch;

  // Determine role
  const branchData = TAGRO.people[deviceBranch] || {};
  let role = 'Staff';
  if (branchData.manager === selectedStaff.name) role = 'Manager';

  // Also check config staff
  const configStaff = jget('tagro_staff_list', []);
  const configEntry = configStaff.find(s => s.name === selectedStaff.name);
  if (configEntry && configEntry.role) role = configEntry.role;

  setSession({
    name:       selectedStaff.name,
    phone:      selectedStaff.phone || '',
    branch:     deviceBranch,
    branchName: branchName,
    role:       role,
    loginAt:    new Date().toISOString()
  });

  location.href = 'home.html';
}

// ── Owner login ───────────────────────────────────────────
async function ownerLogin() {
  const pin = prompt('Owner PIN:');
  if (pin === null) return;

  const key    = 'pin_owner_tmthomas';
  const stored = jget(key, null);

  if (!stored) {
    // First time — set the PIN
    const confirm = prompt('Set owner PIN (first time):');
    if (!confirm || confirm !== pin) { alert('PINs did not match'); return; }
    const hashed = await hashPin(pin);
    jset(key, hashed);
    showToast('Owner PIN set');
  } else {
    const hashed = await hashPin(pin);
    if (hashed !== stored) { showToast('Wrong PIN'); return; }
  }

  setSession({
    name:       'T M Thomas',
    phone:      '9656361846',
    branch:     'ALL',
    branchName: 'All Branches',
    role:       'Owner',
    loginAt:    new Date().toISOString()
  });

  location.href = 'home.html';
}

// ── Helpers ───────────────────────────────────────────────
function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
