<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TAGRO Service Centre</title><link rel="stylesheet" href="app.css"></head><body style="padding-bottom:0"><div class="wrap" style="max-width:420px;padding-top:50px"><div style="text-align:center;margin-bottom:34px"><div class="logo" style="font-size:42px;justify-content:center">TAGRO</div><div class="small" style="font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-top:8px">Service Centre</div></div><div class="card"><div class="head">Staff Login</div><div class="body"><div class="field"><label>Branch</label><select id="branch" onchange="fillUsers()"></select></div><div class="field"><label>User</label><select id="name"></select></div><div class="field"><label>PIN</label><input id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="4 digit PIN" onkeydown="if(event.key==='Enter')login()"></div><button class="btn primary block" onclick="login()">Login</button><div class="small" style="margin-top:10px;text-align:center">First login creates the PIN for that user.</div></div></div><div class="card"><div class="head">Demo Mode</div><div class="body"><p class="small" style="margin-bottom:12px">Explore the app without affecting real records.</p><button class="btn block" onclick="demo()">Enter Demo</button></div></div><div class="card"><div class="head">Owner</div><div class="body"><button class="btn block" onclick="owner()">T M Thomas — All Branches</button></div></div></div><div class="toast"></div><script src="app.js"></script><script>
function fillBranches(){branch.innerHTML=Object.entries(TAGRO.branches).map(([k,v])=>`<option value="${k}">${k} — ${v}</option>`).join('');branch.value='KVR';fillUsers()}function fillUsers(){let b=branch.value;name.innerHTML=allPeople(b).filter(u=>u.name!=='Demo').map(u=>`<option value="${u.name}">${u.name}${u.role==='Manager'?' (Manager)':''}</option>`).join('')}async function login(){let b=branch.value,n=name.value,p=pin.value.trim();if(!p){toast('Enter PIN');return}let u=users(),k=userKey(b,n),hp=await hashPin(p);if(!u[k]){u[k]={pin:hp,name:n,branch:b,created:new Date().toISOString()};saveUsers(u);toast('PIN created')}else if(u[k].pin!==hp){toast('Wrong PIN');pin.value='';return}let role=(TAGRO.people[b]?.manager===n)?'Manager':'Staff';setSession({name:n,branch:b,branchName:TAGRO.branches[b],role,at:Date.now()});location.href='home.html'}function demo(){setSession({name:'Demo',branch:'KVR',branchName:'Karavaloor',role:'Demo',demo:true,at:Date.now()});location.href='home.html'}function owner(){let p=prompt('Owner PIN for this device'); if(p===null)return; setSession({name:'T M Thomas',role:'Owner',branch:'ALL',at:Date.now()});location.href='home.html'}fillBranches();</script></body></html>
