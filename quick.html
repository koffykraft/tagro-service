<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quick Receive</title><link rel="stylesheet" href="app.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#df6427">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
</head><body><div class="wrap"><div class="card"><div class="head">1. Customer</div><div class="body"><div class="field"><label>Phone / Name / Alias</label><input id="search" placeholder="Type phone, name, pet name, place" oninput="suggestCustomers()"></div><div id="suggest" class="suggest hide"></div><div class="grid"><div class="field"><label>Name</label><input id="cname" placeholder="Customer name"></div><div class="field"><label>Phone</label><input id="phone" placeholder="Mobile"></div></div><div class="grid"><div class="field"><label>Place</label><input id="place" placeholder="Village / Town"></div><div class="field"><label>Alias / Pet Name</label><input id="alias" placeholder="Optional"></div></div></div></div><div class="card"><div class="head">2. Machine</div><div class="body"><div id="machines" class="pillrow" style="margin-bottom:10px"></div><div class="grid"><div class="field"><label>Model</label><input id="model" placeholder="MS250 / FS120"></div><div class="field"><label>Serial</label><input id="serial" placeholder="Serial number"></div></div><div class="small" id="history"></div></div></div><div class="card"><div class="head">3. Complaint</div><div class="body"><div class="pillrow" id="complaints"></div><div class="field" style="margin-top:12px"><textarea id="complaint" placeholder="Few words only. Technician can add details later."></textarea></div><button class="btn" onclick="addComplaint()">+ Add another complaint</button><div id="complaintList" class="list" style="margin-top:10px"></div></div></div><div class="card"><div class="head">4. Receive</div><div class="body"><div class="pillrow"><button class="pill on" data-acc="Guide bar">Guide bar</button><button class="pill" data-acc="Chain">Chain</button><button class="pill" data-acc="Fuel present">Fuel present</button><button class="pill" data-acc="Loose parts">Loose parts</button><button class="pill" data-acc="Photo taken">Photo taken</button></div><div class="small" style="margin-top:12px">Accepted by <b id="by"></b>. Details can be completed later from Jobs.</div></div></div></div><div class="fixedbar"><a class="btn" href="home.html">Back</a><button class="btn primary" onclick="saveReceive()">Receive Machine</button></div><script src="app.js"></script><script>let s=requireLogin();initShell('quick');by.textContent=s.name;let selectedCustomer=null,complaintArr=[];let common=['Won\'t Start','No Power','Chain Problem','Carburetor','Fuel Leak','Engine Noise','Service','Other'];complaints.innerHTML=common.map(x=>`<button class="pill" onclick="quickComplaint('${x}')">${x}</button>`).join('');document.addEventListener('click',e=>{if(e.target.classList.contains('pill')&&e.target.dataset.acc)e.target.classList.toggle('on')});function suggestCustomers(){let res=findCustomers(search.value,s.branch);suggest.classList.toggle('hide',!res.length);suggest.innerHTML=res.map(c=>`<button onclick="chooseCustomer('${c.id}')"><b>${c.name}</b><br><span class="small">${(c.alias||[]).join(', ')} · ${c.phone} · ${c.place}</span></button>`).join('')}function chooseCustomer(id){selectedCustomer=customers().find(c=>c.id===id);cname.value=selectedCustomer.name;phone.value=selectedCustomer.phone;place.value=selectedCustomer.place;alias.value=(selectedCustomer.alias||[])[0]||'';suggest.classList.add('hide');machines.innerHTML=(selectedCustomer.machines||[]).map(m=>`<button class="pill" onclick="chooseMachine('${m.id}')">${m.model}<br><span class="small">${m.serial||''}</span></button>`).join('')+'<button class="pill" onclick="newMachine()">+ New Machine</button>';history.textContent='Previous machines populated. Select one to fill model and serial.'}function chooseMachine(id){let m=selectedCustomer.machines.find(x=>x.id===id);model.value=m.model;serial.value=m.serial||'';history.textContent=m.note||'Machine selected from branch memory.'}function newMachine(){model.value='';serial.value='';history.textContent='New machine for this customer.'}function quickComplaint(x){complaint.value=x==='Other'?'':x;complaint.focus()}function addComplaint(){let t=complaint.value.trim();if(!t)return;complaintArr.push({text:t,status:'Received'});complaint.value='';renderComplaints()}function renderComplaints(){complaintList.innerHTML=complaintArr.map((c,i)=>`<div class="item"><div class="title">${i+1}. ${c.text}</div></div>`).join('')}function saveReceive(){if(!cname.value.trim())return toast('Customer name needed');if(!phone.value.trim())return toast('Phone needed');if(!model.value.trim())return toast('Machine model needed');if(complaint.value.trim())addComplaint();if(!complaintArr.length)return toast('Complaint needed');let branch=s.branch;let job={id:'j'+Date.now(),workOrder:wo(branch),branch,branchName:s.branchName,date:new Date().toISOString(),acceptedBy:s.name,status:'Received',customer:{name:cname.value.trim(),phone:phone.value.trim(),place:place.value.trim(),alias:alias.value.trim()},machine:{model:model.value.trim(),serialNo:serial.value.trim()},complaints:complaintArr,accessories:[...document.querySelectorAll('[data-acc].on')].map(b=>b.dataset.acc),parts:[],labour:0,total:0,notes:[],source:'quick'};let a=jobs();a.push(job);saveJobs(a);toast('Machine received');setTimeout(()=>location.href='tracker.html',700)}</script></body></html>
